<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>IMS 2.0 · Inventory</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shell/tokens.css" />
<link rel="stylesheet" href="shell/shell.css" />
<link rel="stylesheet" href="shell/mobile.css" />
<style>
.inv-body { padding: 24px 28px; overflow-y: auto; height: calc(100vh - 52px); background: var(--bg); }
.inv-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
.inv-head h2 { margin: 0 0 4px; font-family: var(--font-display); font-size: 32px; letter-spacing: -0.01em; }

.inv-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
.inv-tabs button {
  height: 36px; padding: 0 14px; border: 0; background: transparent;
  font: 500 12.5px/1 var(--font-sans); color: var(--ink-4); cursor: pointer;
  position: relative; border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.inv-tabs button.on { color: var(--ink); border-bottom-color: var(--ink); }
.inv-tabs button:hover:not(.on) { color: var(--ink-2); }
.inv-tabs .count { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); margin-left: 4px; }

/* Stat strip */
.stat-strip {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  margin-bottom: 18px;
}
.stat-strip > div { padding: 14px 18px; border-right: 1px solid var(--line); }
.stat-strip > div:last-child { border-right: 0; }
.stat-strip .l { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.stat-strip .v { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 26px; line-height: 1; letter-spacing: -.02em; }
.stat-strip .d { font-size: 11.5px; color: var(--ink-4); margin-top: 4px; }
.stat-strip .d.bad { color: var(--err); }
.stat-strip .d.good { color: var(--ok); }

/* Filter row */
.filter-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }

/* Lens power matrix */
.matrix-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: var(--r-lg); background: var(--surface); }
.matrix {
  border-collapse: collapse;
  font-size: 11px;
  font-family: var(--font-mono);
  min-width: 100%;
}
.matrix th, .matrix td {
  border-right: 1px solid var(--line-soft);
  border-bottom: 1px solid var(--line-soft);
  padding: 6px 8px;
  text-align: center;
  min-width: 38px;
  white-space: nowrap;
}
.matrix thead th { background: var(--surface-2); font-weight: 600; color: var(--ink-3); position: sticky; top: 0; }
.matrix th.axis-lbl { background: var(--ink); color: #fff; text-align: left; position: sticky; left: 0; z-index: 2; min-width: 110px; }
.matrix td.axis-lbl { background: var(--surface-2); color: var(--ink-3); text-align: left; font-weight: 600; position: sticky; left: 0; z-index: 1; min-width: 110px; }
.matrix td.zero { color: var(--ink-5); }
.matrix td.low { background: var(--err-50); color: var(--err); font-weight: 600; }
.matrix td.med { background: var(--warn-50); color: var(--warn); font-weight: 500; }
.matrix td.hi { color: var(--ink-2); font-weight: 500; }
.matrix .corner { background: var(--ink); color: #fff; text-align: left; padding: 10px; font-family: var(--font-sans); font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; }

.legend { display: flex; gap: 14px; padding: 10px 14px; border-top: 1px solid var(--line); background: var(--surface-2); font-size: 11.5px; color: var(--ink-3); align-items: center; }
.legend .sw { display: inline-block; width: 14px; height: 14px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }

.inv-layout { display: grid; grid-template-columns: 1fr 320px; gap: 16px; }
.aged-card { padding: 14px; border: 1px solid var(--line); border-radius: var(--r-lg); background: var(--surface); }
.aged-row { padding: 10px 0; border-bottom: 1px solid var(--line-soft); font-size: 12.5px; }
.aged-row:last-child { border-bottom: 0; }
.aged-row .r1 { display: flex; justify-content: space-between; margin-bottom: 3px; }
.aged-row .m { color: var(--ink-3); font-size: 11.5px; }
.aged-row .bar { height: 4px; background: var(--line); border-radius: 3px; margin-top: 6px; overflow: hidden; }
.aged-row .bar > div { height: 100%; background: var(--err); }

/* Count session */
.count-banner {
  background: var(--bv-soft); border: 1px solid var(--bv-50);
  border-radius: 10px; padding: 14px 18px;
  display: flex; gap: 14px; align-items: center; margin-bottom: 16px;
}
.count-banner .icn {
  width: 40px; height: 40px; background: var(--bv); color: #fff;
  border-radius: 8px; display: grid; place-items: center;
  font-family: var(--font-display); font-size: 22px;
}
.count-banner .t { font: 600 13px/1.2 var(--font-sans); margin-bottom: 2px; color: var(--ink); }
.count-banner .s { font-size: 11.5px; color: var(--ink-3); }
.count-banner .spacer { flex: 1; }

.transfer-strip {
  display: grid; grid-template-columns: 1fr auto 1fr auto; gap: 14px;
  align-items: center; padding: 14px;
  background: var(--surface); border: 1px dashed var(--line-strong);
  border-radius: var(--r-lg);
}
.transfer-strip .store {
  padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px;
  background: var(--surface-2);
}
.transfer-strip .store .n { font: 600 13px/1.2 var(--font-sans); }
.transfer-strip .store .c { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); margin-top: 2px; }
.transfer-strip .arr {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--ink); color: #fff; display: grid; place-items: center;
}

/* ── Display zones (layout tab) ────────────────────────────── */
.fl-body { display: grid; grid-template-columns: 1fr 360px; gap: 16px; align-items: start; }
.fl-summary {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  margin-bottom: 14px;
}
.fl-summary > div { padding: 12px 16px; border-right: 1px solid var(--line); }
.fl-summary > div:last-child { border-right: 0; }
.fl-summary .l { font: 500 10px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.fl-summary .v { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 22px; line-height: 1; letter-spacing: -.02em; }
.fl-summary .d { font-size: 11px; color: var(--ink-4); margin-top: 3px; }

.fl-floor { margin-bottom: 16px; }
.fl-floor-head {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 10px;
}
.fl-floor-head .ttl { font: 600 13px/1 var(--font-sans); }
.fl-floor-head .meta { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; }
.fl-floor-head .line { flex: 1; height: 1px; background: var(--line); }

.fix-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
@media (max-width: 1280px) { .fix-grid { grid-template-columns: repeat(2, 1fr); } }

.fix-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 12px 14px 10px; cursor: pointer; transition: border-color .12s, box-shadow .12s, transform .12s;
  display: grid; grid-template-rows: auto auto 1fr auto; gap: 8px; min-height: 122px;
  position: relative;
}
.fix-card:hover { border-color: var(--line-strong); box-shadow: var(--sh-xs); }
.fix-card.on { border-color: var(--ink); box-shadow: 0 0 0 2px var(--ink); }
.fix-card .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
.fix-card .code {
  font-family: var(--font-mono); font-weight: 700; font-size: 13px;
  letter-spacing: .04em; color: var(--ink);
}
.fix-card .tname { font: 500 12.5px/1.3 var(--font-sans); color: var(--ink); margin-top: 2px; }
.fix-card .ticon {
  width: 28px; height: 28px; flex-shrink: 0;
  border: 1px solid var(--line-strong); border-radius: var(--r-sm);
  display: grid; place-items: center; color: var(--ink-3); background: var(--bg-sunk);
}
.fix-card .badges { display: flex; gap: 4px; flex-wrap: wrap; }
.fix-card .b {
  font: 500 9px/1 var(--font-mono); color: var(--ink-3);
  text-transform: uppercase; letter-spacing: .06em;
  padding: 3px 5px; border: 1px solid var(--line-strong); border-radius: 3px; background: var(--surface);
}
.fix-card .b.lock { color: var(--warn); border-color: var(--warn); }
.fix-card .b.cold { color: var(--info); border-color: var(--info); }
.fix-card .b.signature { color: var(--bv); border-color: var(--bv); }
.fix-card .cap {
  display: grid; grid-template-columns: 1fr auto; gap: 10px; align-items: center;
}
.fix-card .cap-bar { height: 6px; background: var(--bg-sunk); border-radius: 1px; overflow: hidden; position: relative; }
.fix-card .cap-bar > div { height: 100%; background: var(--ink); }
.fix-card .cap-bar.lo > div { background: var(--ink-4); }
.fix-card .cap-bar.hi > div { background: var(--warn); }
.fix-card .cap-bar.full > div { background: var(--err); }
.fix-card .cap-pct { font: 600 10.5px/1 var(--font-mono); font-variant-numeric: tabular-nums; color: var(--ink-3); min-width: 32px; text-align: right; }
.fix-card .stats { display: flex; justify-content: space-between; padding-top: 8px; border-top: 1px solid var(--line-soft); font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); }
.fix-card .stats .strong { color: var(--ink); font-weight: 600; }

/* Detail panel */
.fix-panel {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 0; position: sticky; top: 16px; overflow: hidden;
}
.fix-panel-head {
  padding: 14px 16px 12px; border-bottom: 1px solid var(--line);
  background: var(--surface-2);
}
.fix-panel-head .code { font-family: var(--font-mono); font-weight: 700; font-size: 16px; letter-spacing: .04em; }
.fix-panel-head .name { font-size: 13px; color: var(--ink-3); margin-top: 3px; }
.fix-panel-head .meta-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
.fix-panel-meta {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  font-size: 11.5px;
}
.fix-panel-meta .k { color: var(--ink-4); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: .08em; }
.fix-panel-meta .v { color: var(--ink); font-family: var(--font-sans); }
.fix-panel-list { padding: 6px 0; max-height: 420px; overflow-y: auto; }
.fix-panel-list .row {
  display: grid; grid-template-columns: 28px 1fr auto; gap: 10px; padding: 10px 16px;
  align-items: flex-start; border-bottom: 1px solid var(--line-soft);
}
.fix-panel-list .row:last-child { border-bottom: 0; }
.fix-panel-list .ph { width: 28px; height: 22px; }
.fix-panel-list .brand { font: 500 9.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .06em; }
.fix-panel-list .model { font: 500 12px/1.3 var(--font-sans); color: var(--ink); margin-top: 2px; }
.fix-panel-list .sku  { font: 400 9.5px/1 var(--font-mono); color: var(--ink-4); margin-top: 3px; }
.fix-panel-list .pos  { font: 400 10px/1.3 var(--font-mono); color: var(--ink-3); margin-top: 3px; }
.fix-panel-list .qty  { font-family: var(--font-figure); font-weight: 700; font-variant-numeric: tabular-nums; font-size: 16px; text-align: right; letter-spacing: -.01em; }
.fix-panel-list .qty-unit { font: 500 9px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-top: 1px; }
.fix-panel-actions { padding: 12px 16px; border-top: 1px solid var(--line); display: grid; gap: 6px; background: var(--surface-2); }

.fl-empty {
  padding: 36px 20px; text-align: center; color: var(--ink-4); font-size: 12px;
  background: var(--surface); border: 1px dashed var(--line-strong); border-radius: var(--r-lg);
}

/* Zone chip used in Stock ledger */
.zone-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 6px; border: 1px solid var(--line-strong); border-radius: 3px;
  font: 600 9.5px/1 var(--font-mono); color: var(--ink-2);
  letter-spacing: .04em;
}
.zone-chip.warn { border-color: var(--warn); color: var(--warn); }

/* ── GRN receive modal ──────────────────────────────────────────── */
.grn-bg {
  position: fixed; inset: 0; background: rgba(20, 20, 19, 0.45);
  display: grid; place-items: center; z-index: 100;
  padding: 20px;
}
.grn-modal {
  background: var(--surface); border-radius: var(--r-lg);
  width: min(1180px, 100%); max-height: 92vh;
  display: grid; grid-template-rows: auto auto 1fr auto; min-height: 0;
  box-shadow: 0 30px 60px -20px rgba(0,0,0,.4), 0 12px 30px -10px rgba(0,0,0,.2);
  overflow: hidden;
}
.grn-head {
  padding: 14px 22px; border-bottom: 1px solid var(--line);
  display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center;
  background: var(--surface);
}
.grn-head h3 { margin: 0; font: 600 16px/1.2 var(--font-sans); }
.grn-head .sub { font-size: 12px; color: var(--ink-3); margin-top: 3px; }
.grn-head .x {
  width: 32px; height: 32px; border: 1px solid var(--line-strong);
  background: var(--surface); border-radius: var(--r-sm);
  display: grid; place-items: center; cursor: pointer;
}
.grn-head .x:hover { background: var(--bg-sunk); }

.grn-stepper {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  border-bottom: 1px solid var(--line); background: var(--surface-2);
}
.grn-stepper > div {
  padding: 11px 18px; border-right: 1px solid var(--line);
  display: flex; gap: 10px; align-items: flex-start;
}
.grn-stepper > div:last-child { border-right: 0; }
.grn-stepper .n {
  width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--ink-4);
  display: grid; place-items: center; font: 600 11px/1 var(--font-mono); color: var(--ink-4);
  flex-shrink: 0;
}
.grn-stepper .active .n { border-color: var(--ink); color: var(--ink); background: var(--surface); }
.grn-stepper .done .n { border-color: var(--ok); background: var(--ok); color: #fff; }
.grn-stepper .t { font: 600 12px/1.2 var(--font-sans); }
.grn-stepper .active .t { color: var(--ink); }
.grn-stepper .s { font-size: 11px; color: var(--ink-4); margin-top: 2px; }

.grn-body { overflow-y: auto; padding: 18px 22px; min-height: 0; background: var(--bg); }

.grn-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md); margin-bottom: 14px; }
.grn-card-head {
  padding: 10px 16px; border-bottom: 1px solid var(--line);
  display: flex; justify-content: space-between; align-items: center; gap: 10px;
}
.grn-card-head h4 { margin: 0; font: 600 13px/1 var(--font-sans); }
.grn-card-head .meta { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; }

.grn-vendor-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
  padding: 12px 16px;
}
.grn-vendor-grid .l { font: 500 9.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.grn-vendor-grid .v { font-size: 12px; color: var(--ink); font-weight: 500; }
.grn-vendor-grid .v.mono { font-family: var(--font-mono); font-size: 11px; }

/* Line table for assignment */
.grn-lines { width: 100%; border-collapse: collapse; font-size: 11.5px; }
.grn-lines thead th {
  padding: 8px 10px; background: var(--surface-2); font: 600 10px/1 var(--font-mono);
  color: var(--ink-4); text-transform: uppercase; letter-spacing: .06em; text-align: left;
  border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 1;
}
.grn-lines thead th.r { text-align: right; }
.grn-lines tbody td {
  padding: 10px 10px; vertical-align: top; border-bottom: 1px solid var(--line-soft);
}
.grn-lines tbody tr.split td { padding-top: 4px; padding-bottom: 10px; }
.grn-lines .desc { font-weight: 500; }
.grn-lines .desc .sub { font-size: 10.5px; color: var(--ink-4); font-family: var(--font-mono); margin-top: 2px; }
.grn-lines input.qty {
  width: 56px; height: 28px; border: 1px solid var(--line-strong); border-radius: var(--r-sm);
  padding: 0 6px; text-align: right; font: 600 12px/1 var(--font-mono);
  font-variant-numeric: tabular-nums;
}
.grn-lines input.qty:focus { border-color: var(--ink); outline: none; }
.grn-lines input.pos {
  width: 100%; height: 28px; border: 1px solid var(--line-strong); border-radius: var(--r-sm);
  padding: 0 8px; font: 400 11px/1 var(--font-sans); color: var(--ink);
}
.grn-lines select.fix {
  width: 100%; height: 28px; border: 1px solid var(--line-strong); border-radius: var(--r-sm);
  padding: 0 6px; font: 500 11px/1 var(--font-sans); background: var(--surface);
  color: var(--ink); cursor: pointer;
}
.grn-lines select.fix:focus { border-color: var(--ink); outline: none; }
.grn-lines .var-pos { color: var(--err); font: 600 11px/1 var(--font-mono); }
.grn-lines .var-neg { color: var(--warn); font: 600 11px/1 var(--font-mono); }
.grn-lines .var-zero { color: var(--ink-4); }
.grn-lines .split-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font: 500 10px/1 var(--font-mono); color: var(--ink-3);
  background: none; border: 1px dashed var(--line-strong); border-radius: 3px;
  padding: 3px 6px; cursor: pointer; margin-top: 6px;
}
.grn-lines .split-btn:hover { border-color: var(--ink-4); color: var(--ink); }
.grn-lines .split-row { background: rgba(245, 245, 240, .5); }
.grn-lines .split-row td { border-top: 0; padding-top: 6px; }
.grn-lines .split-row td:first-child { padding-left: 30px; }
.grn-lines .split-row .label {
  font: 500 9.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em;
}

.grn-totals {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
  padding: 0;
}
.grn-totals > div { padding: 12px 16px; border-right: 1px solid var(--line); }
.grn-totals > div:last-child { border-right: 0; }
.grn-totals .l { font: 500 10px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 5px; }
.grn-totals .v { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 22px; line-height: 1; letter-spacing: -.02em; }
.grn-totals .d { font-size: 11px; color: var(--ink-4); margin-top: 3px; }

.grn-foot {
  padding: 12px 22px; border-top: 1px solid var(--line);
  display: flex; gap: 10px; align-items: center; background: var(--surface);
}
.grn-foot .spacer { flex: 1; }
.grn-foot .hint { font-size: 11px; color: var(--ink-4); }
/* ── Responsive breakpoints (iPad H / iPad V / mobile) ───────── */
@media (max-width: 1280px) {
  .stat-strip, .fl-summary { grid-template-columns: repeat(3, 1fr); }
  .stat-strip > div:nth-child(4), .stat-strip > div:nth-child(5),
  .fl-summary > div:nth-child(4), .fl-summary > div:nth-child(5) {
    border-top: 1px solid var(--line);
  }
  .fl-body { grid-template-columns: 1fr 320px; }
  .inv-tabs { overflow-x: auto; white-space: nowrap; flex-wrap: nowrap; }
  .fix-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 1024px) {
  .inv-body { padding: 20px 18px; }
  .stat-strip, .fl-summary { grid-template-columns: repeat(2, 1fr); }
  .fl-body { grid-template-columns: 1fr; }
  .fix-panel { position: static; }
  .inv-layout { grid-template-columns: 1fr; }
  .grn-modal { width: 96vw; }
  .grn-vendor-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 640px) {
  .inv-body { padding: 16px 12px; }
  .inv-head { flex-direction: column; gap: 12px; align-items: stretch; }
  .stat-strip, .fl-summary { grid-template-columns: 1fr; }
  .stat-strip > div, .fl-summary > div { border-right: 0; border-bottom: 1px solid var(--line); }
  .fix-grid { grid-template-columns: 1fr; }
  .filter-row { flex-wrap: wrap; }
  .transfer-strip { grid-template-columns: 1fr; }
  .grn-stepper { grid-template-columns: 1fr 1fr; }
  .grn-vendor-grid { grid-template-columns: 1fr; }
  .grn-totals { grid-template-columns: 1fr 1fr; }
}
/* Small polish · table hover, stat-strip rhythm, matrix scan */
.tbl tbody tr { transition: background .1s; }
.tbl tbody tr:hover { background: var(--bg-sunk); }
.stat-strip .v { letter-spacing: -.03em; }
.stat-strip > div { transition: background .12s; }
.stat-strip > div:hover { background: var(--surface-2); }
.matrix tbody tr:hover td:not(.axis-lbl) { background: var(--bg-sunk); }
.fix-card .stats .strong { color: var(--ink); font-weight: 700; }
.zone-chip:hover { background: var(--surface-2); }
.count-banner { box-shadow: var(--sh-xs); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="shell/data.js"></script>
<script type="text/babel" src="shell/shell.jsx"></script>
<script type="text/babel">
const { useState, useMemo } = React;
const fmt = (n) => '₹ ' + Number(n).toLocaleString('en-IN');

/* SVG icons for fixture types — simple line marks, no AI slop */
const FixIcon = {
  window:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="3" width="18" height="18" rx="1"/><path d="M12 3v18M3 12h18"/></svg>,
  wall:    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="4" width="18" height="4"/><rect x="3" y="10" width="18" height="4"/><rect x="3" y="16" width="18" height="4"/></svg>,
  pillar:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M7 3h10v3l-1 13H8L7 6V3z"/><path d="M6 21h12"/></svg>,
  counter: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M3 10h18v8H3z"/><path d="M3 14h18M7 10V6h10v4"/></svg>,
  cabinet: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="4" y="3" width="16" height="18"/><path d="M4 12h16M14 8.5v3M14 14.5v3"/></svg>,
  gondola: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><path d="M5 4h14v4H5zM5 11h14v4H5zM5 18h14v3H5z"/></svg>,
  drawer:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="5" width="18" height="5"/><rect x="3" y="12" width="18" height="5"/><circle cx="12" cy="7.5" r=".7" fill="currentColor"/><circle cx="12" cy="14.5" r=".7" fill="currentColor"/></svg>,
  fridge:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="5" y="3" width="14" height="18"/><path d="M5 10h14M9 6v2M9 14v3"/></svg>,
};
const FixLabel = { window:'Window', wall:'Wall', pillar:'Pillar', counter:'Counter', cabinet:'Cabinet', gondola:'Gondola', drawer:'Drawer', fridge:'Fridge' };
const FloorLabel = { ground:'Ground floor · customer-facing', storage:'Storage / back-room', clinic:'Clinic chamber' };

const SPH = ['+4.00','+3.00','+2.00','+1.00','0.00','-1.00','-2.00','-3.00','-4.00','-5.00','-6.00'];
const CYL = ['0.00','-0.25','-0.50','-0.75','-1.00','-1.25','-1.50','-1.75','-2.00'];

// Seeded pseudo-stock
function stockAt(si, ci) {
  const h = (si * 7 + ci * 3 + 11) % 13;
  if (h < 2) return 0;
  if (h < 4) return 1;
  if (h < 6) return 3;
  if (h < 9) return 6;
  return 10 + (h - 9) * 2;
}

function Matrix() {
  return (
    <div className="matrix-wrap">
      <table className="matrix">
        <thead>
          <tr>
            <th className="corner">Crizal Prevencia 1.6 · CYL →<br/>SPH ↓</th>
            {CYL.map(c => <th key={c}>{c}</th>)}
          </tr>
        </thead>
        <tbody>
          {SPH.map((s, si) => (
            <tr key={s}>
              <td className="axis-lbl">{s}</td>
              {CYL.map((c, ci) => {
                const q = stockAt(si, ci);
                const cls = q === 0 ? 'zero' : q < 3 ? 'low' : q < 6 ? 'med' : 'hi';
                return <td key={c} className={cls}>{q === 0 ? '—' : q}</td>;
              })}
            </tr>
          ))}
        </tbody>
      </table>
      <div className="legend">
        <span><span className="sw" style={{background:'var(--err-50)'}}></span>Low (&lt;3)</span>
        <span><span className="sw" style={{background:'var(--warn-50)'}}></span>Medium (3–5)</span>
        <span><span className="sw" style={{background:'var(--surface-2)', border:'1px solid var(--line)'}}></span>Healthy (6+)</span>
        <span><span className="sw" style={{background:'var(--surface)'}}></span>Zero</span>
        <span className="spacer" style={{flex:1}}></span>
        <span className="hint">99 cells · click a cell to inspect lot / reorder</span>
      </div>
    </div>
  );
}

function Inventory() {
  const [tab, setTab] = useState('stock');
  const [selFix, setSelFix] = useState('W-01');
  const [floorFilter, setFloorFilter] = useState('all');
  const [grnOpen, setGrnOpen] = useState(false);

  const low = MOCK.catalog.filter(i => i.stock < 5);

  /* ── Fixture data wrangling ────────────────────────────────────── */
  const fixturesByFloor = useMemo(() => {
    const g = { ground: [], storage: [], clinic: [] };
    MOCK.fixtures.forEach(f => g[f.floor]?.push(f));
    return g;
  }, []);

  const placementsByFix = useMemo(() => {
    const m = {};
    MOCK.placements.forEach(p => {
      const cat = MOCK.catalog.find(c => c.sku === p.sku);
      if (!cat) return;
      (m[p.fixture] ||= []).push({ ...p, ...cat });
    });
    return m;
  }, []);

  /* Primary fixture for each SKU — first ground-floor placement, or any */
  const skuFixture = useMemo(() => {
    const m = {};
    MOCK.placements.forEach(p => {
      const f = MOCK.fixtures.find(x => x.id === p.fixture);
      if (!m[p.sku] || (f?.floor === 'ground' && MOCK.fixtures.find(x=>x.id===m[p.sku].fixture)?.floor !== 'ground')) {
        m[p.sku] = { fixture: p.fixture, position: p.position };
      }
    });
    return m;
  }, []);

  const fixStats = (fix) => {
    const items = placementsByFix[fix.id] || [];
    const units = items.reduce((a, i) => a + i.qty, 0);
    const pct = Math.min(100, Math.round((units / fix.capacity) * 100));
    return { items, units, pct, skus: items.length };
  };

  const summary = useMemo(() => {
    const placed = new Set(MOCK.placements.map(p => p.sku));
    const unplaced = MOCK.catalog.filter(c => !placed.has(c.sku)).length;
    let units = 0, cap = 0;
    MOCK.fixtures.forEach(f => { cap += f.capacity; units += (placementsByFix[f.id] || []).reduce((a, i) => a + i.qty, 0); });
    return { fixtures: MOCK.fixtures.length, units, cap, unplaced, pct: Math.round(units / cap * 100) };
  }, [placementsByFix]);

  const fix = MOCK.fixtures.find(f => f.id === selFix);
  const fixData = fix ? fixStats(fix) : null;

  return (
    <Shell active="inventory" crumbs={['Inventory']} role="Store Manager"
      actions={<>
        <button className="btn sm">+ Adjustment</button>
        <button className="btn sm primary" onClick={()=>setGrnOpen(true)}>+ Receive GRN</button>
      </>}>
      <div className="inv-body">
        <div className="inv-head">
          <div>
            <div className="eyebrow" style={{marginBottom:6}}>Inventory</div>
            <h2>What's on the floor.</h2>
          </div>
          <div className="row" style={{gap:8}}>
            <button className="btn sm"><Icon.file width="14" height="14" /> Export CSV</button>
            <button className="btn sm"><Icon.printer width="14" height="14" /> Print count sheet</button>
          </div>
        </div>

        <div className="stat-strip">
          <div>
            <div className="l">Total SKUs</div>
            <div className="v">1,240</div>
            <div className="d">across 6 categories</div>
          </div>
          <div>
            <div className="l">Stock value</div>
            <div className="v">₹ 58.4L</div>
            <div className="d good">+2.1% vs LM</div>
          </div>
          <div>
            <div className="l">Low stock</div>
            <div className="v" style={{color:'var(--err)'}}>17</div>
            <div className="d bad">3 auto-drafted by Jarvis</div>
          </div>
          <div>
            <div className="l">Non-moving (90d+)</div>
            <div className="v" style={{color:'var(--warn)'}}>38</div>
            <div className="d">Worth ₹ 2.84L</div>
          </div>
          <div>
            <div className="l">Last count</div>
            <div className="v" style={{fontSize:22}}>4 days ago</div>
            <div className="d">Variance: ₹ 820</div>
          </div>
        </div>

        <div className="inv-tabs">
          {[
            ['stock','Stock ledger', 1240],
            ['layout','Display layout', MOCK.fixtures.length],
            ['matrix','Lens power matrix', 99],
            ['count','Cycle count', 3],
            ['nonmoving','Non-moving', 38],
            ['transfer','Transfers', 2],
            ['tally','Tally inbox', 2],
            ['reorder','Reorder drafts', 5],
          ].map(([k, n, c]) => (
            <button key={k} className={tab===k?'on':''} onClick={()=>setTab(k)}>
              {n}<span className="count">· {c}</span>
            </button>
          ))}
        </div>

        {tab === 'stock' && (
          <>
            <div className="filter-row">
              <input className="input" style={{maxWidth:320}} placeholder="Search SKU, brand, model…" />
              <select className="input" style={{maxWidth:140}}>
                <option>All brands</option><option>Ray-Ban</option><option>Oakley</option>
              </select>
              <select className="input" style={{maxWidth:140}}>
                <option>All types</option><option>Frame</option><option>Lens</option><option>CL</option>
              </select>
              <span className="spacer" style={{flex:1}}></span>
              <div className="chip warn">17 low</div>
              <div className="chip info">Jarvis: 3 reorder drafts ready</div>
            </div>

            <div className="card">
              <table className="tbl">
                <thead><tr>
                  <th></th><th>SKU</th><th>Brand · Model</th><th>Type</th>
                  <th>Zone</th>
                  <th className="right">MRP</th><th className="right">Cost</th>
                  <th className="right">Stock</th><th className="right">Reorder pt.</th>
                  <th className="right">Value</th><th></th>
                </tr></thead>
                <tbody>
                {MOCK.catalog.map((i, idx) => {
                  const fxp = skuFixture[i.sku];
                  const fx = fxp && MOCK.fixtures.find(f => f.id === fxp.fixture);
                  return (
                  <tr key={i.sku}>
                    <td><div className="ph" style={{width:36, height:28, fontSize:8}}>{i.type.slice(0,3)}</div></td>
                    <td className="mono">{i.sku}</td>
                    <td>
                      <div style={{fontSize:11, color:'var(--ink-4)', textTransform:'uppercase', letterSpacing:'.04em'}}>{i.brand}</div>
                      <div className="strong">{i.model}</div>
                    </td>
                    <td><span className="chip">{i.type}</span></td>
                    <td>
                      {fx ? (
                        <span className={'zone-chip' + (fx.lockable ? ' warn' : '')} title={fx.name}>
                          {fx.code}
                          <span style={{color:'var(--ink-4)', fontWeight:400, marginLeft:2}}>· {FixLabel[fx.type]}</span>
                        </span>
                      ) : (
                        <span className="hint" style={{fontSize:10}}>— unassigned</span>
                      )}
                    </td>
                    <td className="right mono tnum">{fmt(i.mrp)}</td>
                    <td className="right mono tnum mute">{fmt(Math.round(i.mrp * 0.55))}</td>
                    <td className="right">
                      <span className={'chip ' + (i.stock < 3 ? 'err' : i.stock < 5 ? 'warn' : 'ok')}>{i.stock}</span>
                    </td>
                    <td className="right mono mute">{i.type === 'Lens' ? '20' : '3'}</td>
                    <td className="right mono tnum strong">{fmt(i.price * i.stock)}</td>
                    <td className="right">
                      {i.stock < 3 && <span className="chip accent">Draft PO</span>}
                    </td>
                  </tr>
                  );
                })}
                </tbody>
              </table>
            </div>
          </>
        )}

        {tab === 'layout' && (
          <>
            <div className="fl-summary">
              <div>
                <div className="l">Fixtures</div>
                <div className="v">{summary.fixtures}</div>
                <div className="d">across 3 floors</div>
              </div>
              <div>
                <div className="l">Units placed</div>
                <div className="v">{summary.units.toLocaleString('en-IN')}</div>
                <div className="d">of {summary.cap.toLocaleString('en-IN')} capacity</div>
              </div>
              <div>
                <div className="l">Capacity used</div>
                <div className="v">{summary.pct}<span style={{fontSize:14, color:'var(--ink-4)'}}>%</span></div>
                <div className="d">{summary.pct < 70 ? 'Headroom available' : 'Approaching full'}</div>
              </div>
              <div>
                <div className="l">Un-placed SKUs</div>
                <div className="v" style={{color: summary.unplaced ? 'var(--warn)' : 'var(--ok)'}}>{summary.unplaced}</div>
                <div className="d">{summary.unplaced ? 'Assign before audit' : 'All SKUs mapped'}</div>
              </div>
              <div>
                <div className="l">Last audit</div>
                <div className="v" style={{fontSize:18}}>18 Apr</div>
                <div className="d">CF-01 · CL fridge</div>
              </div>
            </div>

            <div className="filter-row" style={{marginBottom:12}}>
              <div className="seg" style={{display:'inline-flex', gap:2, padding:2, background:'var(--bg-sunk)', border:'1px solid var(--line)', borderRadius:8}}>
                {[['all','All floors'],['ground','Ground'],['storage','Storage'],['clinic','Clinic']].map(([k,l]) => (
                  <button key={k} className={floorFilter===k?'on':''}
                    onClick={()=>setFloorFilter(k)}
                    style={{height:30, padding:'0 12px', border:0, background: floorFilter===k ? 'var(--surface)' : 'transparent', boxShadow: floorFilter===k ? 'var(--sh-xs)' : 'none', borderRadius:6, font:'500 12px/1 var(--font-sans)', color: floorFilter===k ? 'var(--ink)' : 'var(--ink-4)', cursor:'pointer'}}>
                    {l}
                  </button>
                ))}
              </div>
              <span className="spacer" style={{flex:1}}></span>
              <button className="btn sm"><Icon.file width="14" height="14" /> Export layout map</button>
              <button className="btn sm"><Icon.printer width="14" height="14" /> Print fixture count sheets</button>
              <button className="btn sm primary">+ Add fixture</button>
            </div>

            <div className="fl-body">
              <div>
                {['ground','storage','clinic'].filter(fl => floorFilter==='all' || floorFilter===fl).map(fl => {
                  const list = fixturesByFloor[fl] || [];
                  if (!list.length) return null;
                  return (
                    <div key={fl} className="fl-floor">
                      <div className="fl-floor-head">
                        <span className="ttl">{FloorLabel[fl]}</span>
                        <span className="meta">{list.length} fixture{list.length>1?'s':''}</span>
                        <span className="line"></span>
                      </div>
                      <div className="fix-grid">
                        {list.map(f => {
                          const st = fixStats(f);
                          const sel = selFix === f.id;
                          const bar = st.pct > 90 ? 'full' : st.pct > 70 ? 'hi' : st.pct < 30 ? 'lo' : '';
                          return (
                            <div key={f.id} className={'fix-card' + (sel ? ' on' : '')} onClick={()=>setSelFix(f.id)}>
                              <div className="top">
                                <div>
                                  <div className="code">{f.code}</div>
                                  <div className="tname">{f.name}</div>
                                </div>
                                <div className="ticon" title={FixLabel[f.type]}>{FixIcon[f.type]}</div>
                              </div>
                              <div className="badges">
                                <span className="b">{FixLabel[f.type]}</span>
                                <span className="b">Zone {f.zone}</span>
                                {f.lockable && <span className="b lock">Keyed</span>}
                                {f.tempCtrl && <span className="b cold">{f.tempCtrl}</span>}
                                {f.spotlit && <span className="b signature">Spotlit</span>}
                                {f.mannequin && <span className="b signature">Mannequin</span>}
                              </div>
                              <div className="cap">
                                <div className={'cap-bar ' + bar}><div style={{width: st.pct + '%'}}></div></div>
                                <div className="cap-pct">{st.pct}%</div>
                              </div>
                              <div className="stats">
                                <span><span className="strong">{st.skus}</span> SKUs</span>
                                <span><span className="strong">{st.units}</span> / {f.capacity} units</span>
                                <span>Audit {f.lastAudit}</span>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>

              {/* Right side detail panel */}
              {fix && fixData && (
                <aside className="fix-panel">
                  <div className="fix-panel-head">
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:10}}>
                      <div>
                        <div className="code">{fix.code}</div>
                        <div className="name">{fix.name}</div>
                      </div>
                      <div className="ticon" style={{width:32, height:32, background:'var(--surface)', border:'1px solid var(--line-strong)', borderRadius:'var(--r-sm)', display:'grid', placeItems:'center', color:'var(--ink-3)'}}>{FixIcon[fix.type]}</div>
                    </div>
                    <div className="meta-row">
                      <span className="b" style={{font:'500 9.5px/1 var(--font-mono)', color:'var(--ink-3)', textTransform:'uppercase', letterSpacing:'.06em', padding:'4px 6px', border:'1px solid var(--line-strong)', borderRadius:3, background:'var(--surface)'}}>{FixLabel[fix.type]}</span>
                      <span className="b" style={{font:'500 9.5px/1 var(--font-mono)', color:'var(--ink-3)', textTransform:'uppercase', letterSpacing:'.06em', padding:'4px 6px', border:'1px solid var(--line-strong)', borderRadius:3, background:'var(--surface)'}}>Floor: {fix.floor}</span>
                      <span className="b" style={{font:'500 9.5px/1 var(--font-mono)', color:'var(--ink-3)', textTransform:'uppercase', letterSpacing:'.06em', padding:'4px 6px', border:'1px solid var(--line-strong)', borderRadius:3, background:'var(--surface)'}}>Zone {fix.zone}</span>
                      {fix.lockable && <span className="b" style={{font:'500 9.5px/1 var(--font-mono)', color:'var(--warn)', textTransform:'uppercase', letterSpacing:'.06em', padding:'4px 6px', border:'1px solid var(--warn)', borderRadius:3, background:'var(--surface)'}}>Keyed \u00b7 {fix.key || 'lockable'}</span>}
                    </div>
                  </div>

                  <div className="fix-panel-meta">
                    <div className="k">Capacity</div><div className="v">{fixData.units} / {fix.capacity} units · <b>{fixData.pct}%</b> used</div>
                    <div className="k">SKUs here</div><div className="v">{fixData.skus} distinct</div>
                    <div className="k">Merch tags</div><div className="v">{fix.merch.join(', ')}</div>
                    <div className="k">Last audit</div><div className="v">{fix.lastAudit} · by store team</div>
                    {fix.tempCtrl && (<><div className="k">Temp control</div><div className="v">{fix.tempCtrl}</div></>)}
                    {fix.spotlit && (<><div className="k">Lighting</div><div className="v">Spotlit · 4000K narrow beam</div></>)}
                    {fix.noQR && (<><div className="k">Anti-theft</div><div className="v" style={{color:'var(--warn)'}}>No EAS tag · staff supervision required</div></>)}
                  </div>

                  <div className="fix-panel-list">
                    {fixData.items.length === 0 ? (
                      <div style={{padding:'24px 16px', textAlign:'center', color:'var(--ink-4)', fontSize:12}}>
                        No SKUs placed here yet.<br />
                        <button className="btn sm" style={{marginTop:10}}>+ Assign SKUs</button>
                      </div>
                    ) : fixData.items.map((it, i) => (
                      <div key={i} className="row">
                        <div className="ph">{it.type.slice(0,3)}</div>
                        <div>
                          <div className="brand">{it.brand}</div>
                          <div className="model">{it.model}</div>
                          <div className="sku">{it.sku}</div>
                          <div className="pos">· {it.position}</div>
                        </div>
                        <div>
                          <div className="qty">{it.qty}</div>
                          <div className="qty-unit">{it.type === 'CL' ? 'box' : it.type === 'Lens' ? 'lens' : 'pc'}</div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="fix-panel-actions">
                    <a className="btn block sm" href="print.html"><Icon.printer width="14" height="14" /> Print count sheet for {fix.code}</a>
                    <button className="btn block sm">+ Add SKU to this fixture</button>
                    <button className="btn block sm ghost">Re-merchandise (start audit)</button>
                  </div>
                </aside>
              )}
            </div>
          </>
        )}

        {tab === 'matrix' && (
          <>
            <div className="filter-row">
              <select className="input" style={{maxWidth:280}}><option>Crizal Prevencia 1.6 Blue-cut</option></select>
              <select className="input" style={{maxWidth:140}}><option>Single vision</option></select>
              <select className="input" style={{maxWidth:140}}><option>Plano cyl</option></select>
              <span className="spacer" style={{flex:1}}></span>
              <button className="btn sm">Save as count sheet</button>
              <button className="btn sm primary">Bulk reorder low</button>
            </div>
            <Matrix />
          </>
        )}

        {tab === 'count' && (
          <>
            <div className="count-banner">
              <div className="icn">C</div>
              <div>
                <div className="t">Cycle count in progress · shelf A-12 to A-18</div>
                <div className="s">Started 10:04 by Riya P. · 42 of 78 SKUs counted · 3 variances flagged</div>
              </div>
              <div className="spacer"></div>
              <button className="btn sm">Pause</button>
              <button className="btn sm primary">Resume count</button>
            </div>
            <div className="card">
              <div className="card-head"><h3>Variances this session</h3><span className="meta">Lock requires ASM approval</span></div>
              <table className="tbl">
                <thead><tr><th>SKU</th><th>Product</th><th className="right">System</th><th className="right">Counted</th><th className="right">Δ</th><th>Note</th><th></th></tr></thead>
                <tbody>
                  <tr>
                    <td className="mono">BV-RB-AV-5823</td>
                    <td className="strong">Ray-Ban · Aviator Classic</td>

/* ───────────────────────────────────────────────────────────────────
   GRN Receive Modal — opens from the "+ Receive GRN" header button.
   Per-line zone assignment is the heart of the catalog/purchase ↔
   layout link: when stock arrives the user must declare which fixture
   each unit lands on, with the option to split one line across a
   primary display fixture + a back-stock drawer.
   ─────────────────────────────────────────────────────────────────── */
function GrnReceiveModal({ onClose }) {
  // Lines pulled from PO/BV/2025-26/0042 (the J&J Acuvue reorder)
  const initial = [
    { id: 1, sku: 'BV-AC-OAS-150', d: 'Acuvue Oasys 1-Day · 30-pack · −1.50',  ord: 6, type: 'CL' },
    { id: 2, sku: 'BV-AC-OAS-200', d: 'Acuvue Oasys 1-Day · 30-pack · −2.00',  ord: 6, type: 'CL' },
    { id: 3, sku: 'BV-AC-OAS-250', d: 'Acuvue Oasys 1-Day · 30-pack · −2.50',  ord: 6, type: 'CL' },
    { id: 4, sku: 'BV-AC-OAS-300', d: 'Acuvue Oasys 1-Day · 30-pack · −3.00',  ord: 6, type: 'CL' },
  ];

  const [lines, setLines] = useState(initial.map(l => ({
    ...l,
    rec: l.id === 3 ? 5 : l.ord,                // power −2.50 came short (matches GRN print)
    primary: 'CF-01',
    primQty: l.id === 3 ? 5 : l.ord,
    position: 'shelf-2 · power ' + l.d.split('·').pop().trim(),
    secondary: '',
    secQty: 0,
    secPosition: '',
    split: false,
  })));

  const set = (i, k, v) => setLines(arr => arr.map((row, j) => j === i ? { ...row, [k]: v } : row));
  const toggleSplit = (i) => setLines(arr => arr.map((row, j) => {
    if (j !== i) return row;
    if (row.split) return { ...row, split: false, secondary: '', secQty: 0, secPosition: '', primQty: row.rec };
    const sec = Math.max(1, Math.floor(row.rec * 0.4));
    return { ...row, split: true, primQty: row.rec - sec, secondary: row.type === 'CL' ? 'D-01' : 'D-02', secQty: sec, secPosition: 'overflow tray' };
  }));

  // Filter fixtures by which categories belong on them
  const fixturesFor = (type) => MOCK.fixtures.filter(f => f.merch.includes(type) || (type === 'CL' && f.merch.includes('CL')) || (type === 'Frame' && f.merch.includes('Frame')));

  const totals = lines.reduce((a, l) => ({
    ord: a.ord + l.ord,
    rec: a.rec + l.rec,
    assigned: a.assigned + l.primQty + (l.split ? l.secQty : 0),
    short: a.short + Math.max(0, l.ord - l.rec),
  }), { ord: 0, rec: 0, assigned: 0, short: 0 });

  const allAssigned = lines.every(l => (l.primQty + (l.split ? l.secQty : 0)) === l.rec);

  return (
    <div className="grn-bg" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="grn-modal">
        <div className="grn-head">
          <div>
            <h3>Receive Goods · GRN against PO</h3>
            <div className="sub">PO <span className="mono" style={{color:'var(--ink)'}}>PO/BV/2025-26/0042</span> · Johnson &amp; Johnson India Pvt. Ltd. · vendor invoice <span className="mono" style={{color:'var(--ink)'}}>JJ/24/04/2240</span> dated 17-Apr-2026</div>
          </div>
          <button className="x" onClick={onClose} aria-label="Close">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6 6l12 12M18 6l-12 12"/></svg>
          </button>
        </div>

        <div className="grn-stepper">
          <div className="done"><div className="n">✓</div><div><div className="t">Match PO &amp; vendor invoice</div><div className="s">PO-0042 · J&amp;J · 4 lines</div></div></div>
          <div className="done"><div className="n">✓</div><div><div className="t">Verify boxes &amp; seal</div><div className="s">3 of 3 boxes · seal #4412 intact</div></div></div>
          <div className="active"><div className="n">3</div><div><div className="t">Assign placement</div><div className="s">Which fixture each unit goes to</div></div></div>
          <div><div className="n">4</div><div><div className="t">Post &amp; close</div><div className="s">Stock + placements updated</div></div></div>
        </div>

        <div className="grn-body">
          {/* Vendor block */}
          <div className="grn-card">
            <div className="grn-card-head">
              <h4>Consignment details</h4>
              <span className="meta">read-only · from PO + invoice</span>
            </div>
            <div className="grn-vendor-grid">
              <div><div className="l">Vendor</div><div className="v">Johnson &amp; Johnson India</div></div>
              <div><div className="l">Vendor GSTIN</div><div className="v mono">27AAACJ4863N1ZE</div></div>
              <div><div className="l">Carrier</div><div className="v">BlueDart Surface · BB-DL-22100</div></div>
              <div><div className="l">Received at</div><div className="v">18-Apr-2026 · 09:40 IST</div></div>
              <div><div className="l">Boxes · seal</div><div className="v">3 of 3 · seal #4412 intact</div></div>
              <div><div className="l">Place of supply</div><div className="v">07 · Delhi (intra-state at receipt)</div></div>
              <div><div className="l">Received by</div><div className="v">Sonia Khatri · SM</div></div>
              <div><div className="l">QA</div><div className="v" style={{color:'var(--ok)'}}>● Inspected · OK</div></div>
            </div>
          </div>

          {/* Line assignment */}
          <div className="grn-card">
            <div className="grn-card-head">
              <h4>Line items · assign placement</h4>
              <span className="meta">{lines.length} lines · {totals.assigned}/{totals.rec} units assigned</span>
            </div>
            <table className="grn-lines">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Item</th>
                  <th className="r">Ord.</th>
                  <th className="r">Rec.</th>
                  <th className="r">Δ</th>
                  <th style={{width:170}}>Primary fixture</th>
                  <th className="r">Qty</th>
                  <th>Position within fixture</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {lines.map((l, i) => {
                  const variance = l.rec - l.ord;
                  const assigned = l.primQty + (l.split ? l.secQty : 0);
                  const unbal = assigned !== l.rec;
                  return (
                    <React.Fragment key={l.id}>
                      <tr style={unbal ? { background: 'var(--err-50)' } : null}>
                        <td className="mono" style={{color:'var(--ink-4)'}}>{i+1}</td>
                        <td className="desc">
                          {l.d}
                          <div className="sub">{l.sku} · HSN 9001</div>
                        </td>
                        <td className="r mono">{l.ord}</td>
                        <td className="r">
                          <input className="qty" type="number" min="0" max={l.ord} value={l.rec}
                            onChange={(e) => {
                              const v = Math.max(0, Math.min(l.ord, +e.target.value || 0));
                              set(i, 'rec', v);
                              if (!l.split) set(i, 'primQty', v);
                              else {
                                const newPrim = Math.max(0, v - l.secQty);
                                set(i, 'primQty', newPrim);
                              }
                            }} />
                        </td>
                        <td className={'r ' + (variance < 0 ? 'var-neg' : variance > 0 ? 'var-pos' : 'var-zero')}>
                          {variance === 0 ? '—' : (variance > 0 ? '+' + variance : variance)}
                        </td>
                        <td>
                          <select className="fix" value={l.primary} onChange={(e) => set(i, 'primary', e.target.value)}>
                            {fixturesFor(l.type).map(f => (
                              <option key={f.id} value={f.id}>{f.code} · {f.name}</option>
                            ))}
                          </select>
                        </td>
                        <td className="r">
                          <input className="qty" type="number" min="0" max={l.rec} value={l.primQty}
                            onChange={(e) => {
                              const v = Math.max(0, Math.min(l.rec, +e.target.value || 0));
                              set(i, 'primQty', v);
                              if (l.split) set(i, 'secQty', l.rec - v);
                            }} />
                        </td>
                        <td>
                          <input className="pos" type="text" value={l.position}
                            placeholder="e.g. shelf-2 · slot-04"
                            onChange={(e) => set(i, 'position', e.target.value)} />
                        </td>
                        <td>
                          {!l.split ? (
                            <button className="split-btn" onClick={() => toggleSplit(i)} title="Split this line across two fixtures">+ Split</button>
                          ) : (
                            <button className="split-btn" onClick={() => toggleSplit(i)} style={{color:'var(--err)', borderColor:'var(--err)'}}>− Merge</button>
                          )}
                        </td>
                      </tr>
                      {l.split && (
                        <tr className="split-row">
                          <td></td>
                          <td colSpan={4} style={{paddingLeft: 24}}>
                            <div className="label" style={{marginBottom: 3}}>↳ Overflow to back-stock</div>
                            <div style={{fontSize: 10.5, color: 'var(--ink-3)'}}>
                              {l.primQty} units to display + {l.secQty} units to drawer = {l.primQty + l.secQty} total
                            </div>
                          </td>
                          <td>
                            <select className="fix" value={l.secondary} onChange={(e) => set(i, 'secondary', e.target.value)}>
                              {MOCK.fixtures.filter(f => f.floor === 'storage' || f.type === 'fridge').map(f => (
                                <option key={f.id} value={f.id}>{f.code} · {f.name}</option>
                              ))}
                            </select>
                          </td>
                          <td className="r">
                            <input className="qty" type="number" min="0" max={l.rec} value={l.secQty}
                              onChange={(e) => {
                                const v = Math.max(0, Math.min(l.rec, +e.target.value || 0));
                                set(i, 'secQty', v);
                                set(i, 'primQty', l.rec - v);
                              }} />
                          </td>
                          <td>
                            <input className="pos" type="text" value={l.secPosition}
                              placeholder="e.g. tray-3"
                              onChange={(e) => set(i, 'secPosition', e.target.value)} />
                          </td>
                          <td></td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
            </table>
          </div>

          {/* Totals */}
          <div className="grn-card">
            <div className="grn-totals">
              <div>
                <div className="l">Lines</div>
                <div className="v">{lines.length}</div>
                <div className="d">all matched against PO</div>
              </div>
              <div>
                <div className="l">Units ordered → received</div>
                <div className="v">{totals.rec} <span style={{fontSize:13, color:'var(--ink-4)'}}>/ {totals.ord}</span></div>
                <div className="d" style={{color: totals.short ? 'var(--err)' : 'var(--ok)'}}>
                  {totals.short ? totals.short + ' short · raise debit note' : 'No variance'}
                </div>
              </div>
              <div>
                <div className="l">Units placed</div>
                <div className="v" style={{color: allAssigned ? 'var(--ok)' : 'var(--err)'}}>{totals.assigned}</div>
                <div className="d">{allAssigned ? 'All units mapped to fixtures' : 'Mismatch — fix qty above'}</div>
              </div>
              <div>
                <div className="l">Fixtures affected</div>
                <div className="v">{new Set(lines.flatMap(l => [l.primary, l.split ? l.secondary : null].filter(Boolean))).size}</div>
                <div className="d">primary + back-stock</div>
              </div>
            </div>
          </div>
        </div>

        <div className="grn-foot">
          <span className="hint">GRN <b className="mono">GRN/BV/2025-26/0418-22</b> will be created · placements written to <b className="mono">inventory.placements</b> · stock ledger updated.</span>
          <span className="spacer"></span>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn">Save as draft</button>
          <button className="btn primary" disabled={!allAssigned} onClick={onClose}>
            Post GRN &amp; assign placements
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Inventory />);
</script>
</body>
</html>
