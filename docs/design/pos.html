<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>IMS 2.0 · POS</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shell/tokens.css" />
<link rel="stylesheet" href="shell/shell.css" />
<style>
/* POS layout ─────────────────────────────────────────────── */
.pos-body {
  display: grid;
  grid-template-columns: 220px 1fr 380px;
  height: calc(100vh - 52px);
  min-height: 0;
}

/* ── Stepper rail ──────────────────────────────────────────── */
.steps-rail {
  background: var(--surface);
  border-right: 1px solid var(--line);
  padding: 20px 16px;
  overflow-y: auto;
}
.steps-rail .eyebrow { margin-bottom: 14px; }
.step {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 12px 10px; border-radius: 8px; cursor: pointer;
  position: relative;
  transition: background .12s;
}
.step:hover { background: var(--bg-sunk); }
.step.active { background: var(--ink); color: #fff; }
.step.active .step-num { background: #fff; color: var(--ink); }
.step.active .step-title { color: #fff; }
.step.active .step-sub { color: rgba(255,255,255,.6); }
.step.done .step-num { background: var(--ok); color: #fff; border-color: var(--ok); }
.step.done .step-num::before { content: '✓'; font-family: var(--font-mono); font-size: 11px; }
.step.done .step-num span { display: none; }
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--line-strong);
  display: grid; place-items: center;
  font: 600 11px/1 var(--font-mono); color: var(--ink-3);
  background: var(--surface);
  flex-shrink: 0;
}
.step-title { font: 600 13px/1.2 var(--font-sans); color: var(--ink); }
.step-sub { font-size: 11px; color: var(--ink-4); margin-top: 3px; line-height: 1.3; }
.step + .step::before {
  content: ''; position: absolute; left: 21px; top: -2px; width: 1.5px; height: 14px;
  background: var(--line-strong);
}
.step.active + .step::before,
.step.done + .step::before { background: var(--ok); }

.steps-rail .held {
  margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--line);
}
.held-item {
  padding: 10px; border-radius: 8px; border: 1px dashed var(--line-strong);
  margin-bottom: 8px; cursor: pointer; background: var(--surface-2);
}
.held-item:hover { border-color: var(--ink); }
.held-item .row1 { display: flex; justify-content: space-between; font: 500 12px/1 var(--font-sans); color: var(--ink); margin-bottom: 4px; }
.held-item .row2 { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-4); }
.held-item .row1 .code { font-family: var(--font-mono); font-size: 11px; }

/* ── Middle: work surface ──────────────────────────────────── */
.pos-work {
  overflow-y: auto;
  padding: 24px 28px 120px;
  background: var(--bg);
}
.work-head { margin-bottom: 20px; }
.work-head h2 { margin: 0 0 4px; font-family: var(--font-display); font-size: 32px; letter-spacing: -0.01em; }
.work-head .sub { color: var(--ink-4); font-size: 13px; }

/* Customer step */
.cust-search-wrap { position: relative; max-width: 540px; margin-bottom: 14px; }
.cust-search { height: 48px; padding: 0 14px 0 42px; font-size: 14px; border-radius: 10px; }
.cust-search-wrap > svg { position: absolute; left: 14px; top: 17px; color: var(--ink-4); }
.cust-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
.cust-card {
  padding: 14px; border: 1px solid var(--line); border-radius: 10px;
  background: var(--surface); cursor: pointer;
  transition: border-color .12s, box-shadow .12s;
}
.cust-card:hover { border-color: var(--line-strong); }
.cust-card.selected { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(20,20,19,.08); }
.cust-card .name { font: 600 14px/1.2 var(--font-sans); margin-bottom: 4px; }
.cust-card .ph { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-3); }
.cust-card .row2 { display: flex; gap: 6px; margin-top: 10px; }

/* Rx step */
.rx-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 20px; max-width: 820px;
}
.rx-grid {
  display: grid; grid-template-columns: 60px repeat(5, 1fr) 80px;
  gap: 8px; align-items: center;
  margin-bottom: 6px;
}
.rx-grid .rx-head {
  font: 500 10.5px/1 var(--font-mono); color: var(--ink-4);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 8px 0 4px;
}
.rx-grid .rx-eye {
  font: 600 12px/1 var(--font-mono); color: var(--ink-2);
  background: var(--bg-sunk); padding: 12px 8px; border-radius: 6px;
  text-align: center;
}
.rx-grid input.input { height: 40px; text-align: center; font-family: var(--font-mono); font-size: 13px; }
.rx-row2 { display: flex; gap: 12px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--line); flex-wrap: wrap; }
.rx-row2 label { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-2); cursor: pointer; }

/* Products step */
.prod-layout { display: grid; grid-template-columns: 1fr; gap: 16px; max-width: 1000px; }
.prod-search-row { display: flex; gap: 10px; align-items: center; }
.prod-tabs { display: flex; gap: 4px; background: var(--bg-sunk); padding: 3px; border-radius: 10px; }
.prod-tabs button {
  height: 34px; padding: 0 14px; border: 0; background: transparent;
  font: 500 12.5px/1 var(--font-sans); color: var(--ink-3); border-radius: 7px; cursor: pointer;
}
.prod-tabs button.on { background: var(--surface); color: var(--ink); box-shadow: var(--sh-xs); }

.prod-table { width: 100%; }
.prod-table td.pic {
  width: 64px;
}
.prod-table .pic .ph { width: 48px; height: 40px; font-size: 8px; }
.prod-table .sku { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); }
.prod-table .brand { font-size: 11px; color: var(--ink-4); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
.prod-table .model { font: 500 13px/1.2 var(--font-sans); }
.prod-table tr.added td { background: var(--ok-50); }

/* Payment step */
.pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 900px; }
.pay-method {
  border: 1px solid var(--line); border-radius: 10px; padding: 14px;
  background: var(--surface); cursor: pointer; display: flex; gap: 12px; align-items: center;
}
.pay-method.on { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(20,20,19,.08); }
.pay-method .ic {
  width: 40px; height: 40px; border-radius: 8px; background: var(--bg-sunk);
  display: grid; place-items: center; font-family: var(--font-mono); font-size: 11px;
}
.pay-method .n { font: 600 13px/1.2 var(--font-sans); }
.pay-method .d { font-size: 11px; color: var(--ink-4); }

.split-line {
  display: grid; grid-template-columns: 140px 1fr 140px 32px;
  gap: 8px; align-items: center; margin-bottom: 8px;
}
.split-line select, .split-line input {
  height: 40px; padding: 0 10px; border: 1px solid var(--line-strong);
  border-radius: 8px; background: var(--surface); font-size: 13px;
}
.split-line input.num { text-align: right; font-variant-numeric: tabular-nums; }

/* Review step */
.review-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px; max-width: 1020px; }
.review-sec {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 16px 18px;
}
.review-sec h3 {
  margin: 0 0 10px; font: 500 11px/1 var(--font-mono); color: var(--ink-4);
  text-transform: uppercase; letter-spacing: .1em;
}
.kv { display: grid; grid-template-columns: 120px 1fr; gap: 8px 12px; font-size: 12.5px; }
.kv .k { color: var(--ink-4); }
.kv .v { color: var(--ink); }

/* ── Right: cart sidecar ───────────────────────────────────── */
.cart {
  background: var(--surface);
  border-left: 1px solid var(--line);
  display: flex; flex-direction: column;
  min-height: 0;
}
.cart-head {
  padding: 16px 18px 12px;
  border-bottom: 1px solid var(--line);
}
.cart-head .row { justify-content: space-between; }
.cart-head h3 { margin: 0; font: 600 13px/1 var(--font-sans); }
.cart-head .txid { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); }
.cart-cust {
  display: flex; gap: 10px; align-items: center;
  padding: 10px 12px; background: var(--bg-sunk); border-radius: 8px;
  margin-top: 12px;
}
.cart-cust .av {
  width: 32px; height: 32px; border-radius: 50%; background: var(--ink);
  color: #fff; display: grid; place-items: center;
  font-size: 12px; font-weight: 600;
}
.cart-cust .n { font: 600 12.5px/1.2 var(--font-sans); }
.cart-cust .m { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); }

.cart-items { flex: 1; overflow-y: auto; padding: 8px 14px; min-height: 0; }
.cart-item {
  padding: 12px 4px; border-bottom: 1px solid var(--line-soft);
  display: grid; grid-template-columns: 48px 1fr auto; gap: 10px; align-items: flex-start;
}
.cart-item .ph { width: 48px; height: 40px; font-size: 8px; }
.cart-item .brand { font: 500 10px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 3px; }
.cart-item .model { font: 500 12.5px/1.25 var(--font-sans); margin-bottom: 4px; }
.cart-item .meta { font-size: 11px; color: var(--ink-4); }
.cart-item .px { font-family: var(--font-mono); font-size: 12px; text-align: right; font-variant-numeric: tabular-nums; }
.cart-item .qty-row {
  display: flex; align-items: center; gap: 6px; margin-top: 6px;
}
.qty-btn {
  width: 22px; height: 22px; border: 1px solid var(--line-strong);
  border-radius: 4px; background: var(--surface); cursor: pointer;
  font: 600 12px/1 var(--font-sans); color: var(--ink-3);
}
.qty-val { font: 600 12px/1 var(--font-mono); min-width: 18px; text-align: center; }

.cart-empty {
  text-align: center; padding: 40px 20px; color: var(--ink-4); font-size: 12.5px;
}

.cart-tot { padding: 14px 18px; border-top: 1px solid var(--line); background: var(--surface-2); }
.cart-tot .row { justify-content: space-between; padding: 4px 0; font-size: 12.5px; }
.cart-tot .row .l { color: var(--ink-3); }
.cart-tot .row .r { font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--ink); }
.cart-tot .grand {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 10px 0 0; margin-top: 8px; border-top: 1px solid var(--line);
}
.cart-tot .grand .l { font: 500 11px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; }
.cart-tot .grand .r { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 26px; line-height: 1; letter-spacing: -.02em; }

.cart-actions { padding: 12px 14px; border-top: 1px solid var(--line); display: flex; gap: 8px; }

/* Bottom action bar */
.action-bar {
  position: sticky; bottom: 0; left: 0; right: 0;
  padding: 12px 28px;
  background: var(--surface); border-top: 1px solid var(--line);
  display: flex; gap: 10px; align-items: center;
  margin: 24px -28px 0;
  box-shadow: 0 -6px 16px -12px rgba(0,0,0,.18);
  z-index: 5;
}
.action-bar .spacer { flex: 1; }
.action-bar .hotkeys { display: flex; gap: 12px; font-size: 11.5px; color: var(--ink-4); }
.action-bar .hotkeys span { display: inline-flex; align-items: center; gap: 4px; }

/* Receipt overlay */
.receipt {
  width: 360px; padding: 24px;
  font-family: var(--font-mono); font-size: 11px; color: var(--ink);
  background: var(--surface);
}
.receipt .center { text-align: center; }
.receipt hr { border: 0; border-top: 1px dashed var(--ink-5); margin: 10px 0; }
.receipt .bv-logo {
  width: 40px; height: 40px; border-radius: 8px; background: var(--bv); color: #fff;
  display: grid; place-items: center; font-family: var(--font-display); font-size: 22px;
  margin: 0 auto 10px;
}
.receipt table { width: 100%; border-collapse: collapse; }
.receipt td { padding: 3px 0; vertical-align: top; }
.receipt .r { text-align: right; }
.receipt .big { font-family: var(--font-figure); font-weight: 700; font-variant-numeric: tabular-nums; font-size: 16px; letter-spacing: -.02em; }

/* Tweaks panel ─────────────────────────────────────────────── */
.pos-body { grid-template-columns: 220px 1fr var(--cart-w, 380px); }
body.dense-rail .steps-rail .step { padding: 7px 10px; }
body.dense-rail .steps-rail .step-sub { display: none; }

.tweaks-panel {
  position: fixed; right: 18px; bottom: 18px; width: 300px; z-index: 50;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); box-shadow: 0 24px 48px -16px rgba(0,0,0,.22);
  font-size: 12.5px; overflow: hidden;
}
.tweaks-panel .th {
  padding: 12px 14px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; gap: 8px;
  background: var(--ink); color: #fff;
}
.tweaks-panel .th .dot { width:8px; height:8px; border-radius:50%; background: var(--bv); box-shadow: 0 0 0 3px rgba(86,95,227,.25); }
.tweaks-panel .th .t { font: 600 12px/1 var(--font-sans); letter-spacing:.02em; flex:1; }
.tweaks-panel .th .k { font-family: var(--font-mono); font-size:10px; color:#9a9a92; }
.tweaks-panel .body { padding: 6px 14px 14px; max-height: 70vh; overflow-y: auto; }
.tweaks-panel .grp { padding: 10px 0; border-bottom: 1px dashed var(--line); }
.tweaks-panel .grp:last-child { border-bottom: 0; }
.tweaks-panel .lbl { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing:.08em; margin-bottom: 8px; display: flex; justify-content: space-between; }
.tweaks-panel .lbl .v { color: var(--ink-2); text-transform: none; letter-spacing: 0; font-family: var(--font-mono); }
.tweaks-panel .seg-t { display: flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
.tweaks-panel .seg-t button {
  flex:1; height:28px; border:0; background: var(--surface); font:500 11px/1 var(--font-sans);
  color: var(--ink-3); cursor: pointer; border-right: 1px solid var(--line);
}
.tweaks-panel .seg-t button:last-child { border-right:0; }
.tweaks-panel .seg-t button.on { background: var(--ink); color: #fff; }
.tweaks-panel .row-t { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
.tweaks-panel .row-t .n { font-size: 12.5px; }
.tweaks-panel input[type=range] { width: 100%; }
.tweaks-panel .tgl-t {
  width: 32px; height: 18px; border-radius: 9px; background: var(--line-strong); position: relative; cursor: pointer; transition: background .14s;
}
.tweaks-panel .tgl-t::after { content:''; position:absolute; top:2px; left:2px; width:14px; height:14px; border-radius:50%; background:#fff; box-shadow: 0 1px 2px rgba(0,0,0,.25); transition: transform .14s; }
.tweaks-panel .tgl-t.on { background: var(--ok); }
.tweaks-panel .tgl-t.on::after { transform: translateX(14px); }
</style>
</head>
