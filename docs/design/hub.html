<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>IMS 2.0 · Hub</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shell/tokens.css" />
<link rel="stylesheet" href="shell/shell.css" />
<style>
.hub-bg { background: var(--bg); min-height: calc(100vh - 52px); overflow: auto; }
.hub-hero {
  padding: 48px 48px 24px;
  display: grid; grid-template-columns: 1.2fr 1fr; gap: 48px;
  align-items: end;
  border-bottom: 1px solid var(--line);
  background:
    radial-gradient(1200px 300px at 80% -50%, rgba(205,32,26,.08), transparent 70%),
    var(--surface);
}
.hub-hero .eyebrow { margin-bottom: 14px; }
.hub-hero h1 {
  font-family: var(--font-display); font-weight: 400;
  font-size: 56px; line-height: 1.02; letter-spacing: -0.02em;
  margin: 0 0 14px; color: var(--ink);
}
.hub-hero h1 em { font-style: italic; color: var(--bv); }
.hub-hero .sub { max-width: 520px; color: var(--ink-3); font-size: 14px; line-height: 1.55; }
.hub-hero .meta-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
  border-left: 1px solid var(--line); padding-left: 32px;
}
.hub-hero .meta-grid .k { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
.hub-hero .meta-grid .v { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 32px; line-height: 1; color: var(--ink); letter-spacing: -0.02em; }
.hub-hero .meta-grid .sm { font-size: 12px; color: var(--ink-4); margin-top: 4px; }

.modules {
  padding: 32px 48px 48px;
  display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px;
}
.mod-card {
  grid-column: span 4;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
  transition: border-color .15s, transform .15s, box-shadow .15s;
  cursor: pointer;
  text-decoration: none; color: inherit;
  min-height: 180px;
  position: relative;
  overflow: hidden;
}
.mod-card:hover { border-color: var(--line-strong); box-shadow: var(--sh-md); transform: translateY(-1px); }
.mod-card.wide { grid-column: span 6; }
.mod-card.span-3 { grid-column: span 3; }
.mod-card.feature { grid-column: span 6; background: var(--ink); color: #fff; border-color: var(--ink); }
.mod-card.feature .eyebrow { color: #9a9a92; }
.mod-card.feature .mod-title { color: #fff; }
.mod-card.feature .mod-desc { color: #b6b6ae; }
.mod-card.feature .mod-meta { color: #8a8a82; border-top-color: #2a2a28; }
.mod-card.feature .mod-badge { background: var(--bv); color: #fff; }

.mod-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.mod-icon {
  width: 36px; height: 36px; border-radius: 8px;
  background: var(--bg-sunk); display: grid; place-items: center;
  color: var(--ink-2); flex-shrink: 0;
}
.mod-card.feature .mod-icon { background: #2a2a28; color: #fff; }
.mod-title { font-family: var(--font-display); font-size: 28px; line-height: 1.05; letter-spacing: -0.01em; margin: 0; }
.mod-desc { font-size: 12.5px; color: var(--ink-3); line-height: 1.5; flex: 1; }
.mod-meta {
  display: flex; gap: 16px; padding-top: 12px;
  border-top: 1px solid var(--line); margin-top: auto;
  font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .06em;
}
.mod-meta strong { font-family: var(--font-sans); font-size: 13px; font-weight: 600; color: var(--ink); text-transform: none; letter-spacing: 0; display: block; margin-top: 4px; }
.mod-card.feature .mod-meta strong { color: #fff; }
.mod-badge {
  position: absolute; top: 16px; right: 16px;
  background: var(--bv-50); color: var(--bv);
  font: 500 10px/1 var(--font-mono); letter-spacing: .08em;
  text-transform: uppercase; padding: 4px 7px; border-radius: 4px;
}

.section-head {
  grid-column: 1 / -1;
  display: flex; align-items: baseline; gap: 16px;
  margin: 20px 0 -4px;
}
.section-head .eyebrow { flex: 0; }
.section-head .line { flex: 1; height: 1px; background: var(--line); }
.section-head .sub { font-size: 12px; color: var(--ink-4); }

.news-strip {
  display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 0;
  border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
  background: var(--surface);
}
.news-strip > div {
  padding: 18px 24px;
  border-right: 1px solid var(--line);
}
.news-strip > div:last-child { border-right: 0; }
.news-strip .eyebrow { margin-bottom: 8px; }
.news-strip h4 { margin: 0 0 4px; font: 500 13px/1.3 var(--font-sans); color: var(--ink); }
.news-strip p { margin: 0; font-size: 12px; color: var(--ink-3); line-height: 1.5; }
.news-strip .ago { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-top: 8px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="shell/data.js"></script>
<script type="text/babel" src="shell/shell.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Hub() {
  const modules = [
    {
      id: 'pos', href: 'pos.html', feature: true,
      title: 'POS', eyebrow: 'Checkout',
      desc: '6-step guided checkout with Rx intake, split payments, hold & recall, and printable invoice + job card.',
      icon: <Icon.cart width="20" height="20" />,
      meta: [['Today', '42 tx'], ['Held', '2 carts'], ['Avg basket', '₹ 6,840']],
      badge: 'Most used'
    },
    {
      id: 'clinical', href: 'clinical.html', feature: true,
      title: 'Clinical', eyebrow: 'Eye exam',
      desc: 'Optometrist queue, A5 Rx card, refraction form, handoff to POS with family & external-doctor flags.',
      icon: <Icon.eye width="20" height="20" />,
      meta: [['In queue', '4'], ['In exam', '1'], ['Avg wait', '8m']],
    },
    {
      id: 'inventory', href: 'inventory.html',
      title: 'Inventory', eyebrow: 'Stock',
      desc: 'Live stock by SKU, lens power matrix, cycle count, non-moving flags, inter-store transfer.',
      icon: <Icon.box width="20" height="20" />,
      meta: [['SKUs', '1,240'], ['Low', '17'], ['Non-moving', '38']],
    },
    {
      id: 'tasks', href: 'tasks.html',
      title: 'Tasks & SOPs', eyebrow: 'Ops',
      desc: 'P0–P4 priorities with countdown timers and auto-escalation tied to SOPs.',
      icon: <Icon.check width="20" height="20" />,
      meta: [['Open', '12'], ['Overdue', '2'], ['P1 active', '2']],
    },
    {
      id: 'reports', href: 'reports.html',
      title: 'Reports', eyebrow: 'Analytics',
      desc: 'Day-end close, MoM & YoY trends, sell-through by category, aging cohorts.',
      icon: <Icon.chart width="20" height="20" />,
      meta: [['MTD sales', '₹ 12.4L'], ['vs LM', '+8.2%']],
    },
    {
      id: 'jarvis', href: 'jarvis.html',
      title: 'Jarvis', eyebrow: 'Automation · Superadmin',
      desc: '8 always-on agents watching inventory, pricing, escalations, Rx reconciliation and more.',
      icon: <Icon.cpu width="20" height="20" />,
      meta: [['Agents', '6/8 on'], ['Actions 24h', '45']],
      badge: 'Super-admin'
    },
    {
      id: 'setup', href: 'setup.html',
      title: 'Store Setup', eyebrow: 'Configuration',
      desc: 'Deep feature toggles, GST & billing, print templates, role matrix, audit log.',
      icon: <Icon.settings width="20" height="20" />,
      meta: [['Toggles', '84'], ['Changed 7d', '3']],
    },
    {
      id: 'print', href: 'print.html',
      title: 'Print templates', eyebrow: 'Documents',
      desc: 'Tax invoice, Rx card, lens job card, queue token, delivery challan, and credit note — all GST-ready.',
      icon: <Icon.printer width="20" height="20" />,
      meta: [['Templates', '6 live'], ['Printed 30d', '2.8k']],
    },
  ];

  return (
    <Shell active="hub" crumbs={['Home']} role="Store Manager">
      <div className="hub-bg">
        <section className="hub-hero">
          <div>
            <div className="eyebrow">Better Vision · IMS 2.0 · Tue 19 Apr, 2026</div>
            <h1>Run the floor.<br/>Close the <em>day</em>.</h1>
            <p className="sub">Every Better Vision store is one shift, one queue, one ledger. IMS 2.0 is the single surface your team opens at 10 AM and closes at 9 PM — checkout, exam, stock, tasks, and the agents that quietly keep everything in line.</p>
          </div>
          <div className="meta-grid">
            <div>
              <div className="k">Sales · Today</div>
              <div className="v">₹ 48,210</div>
              <div className="sm">+12% vs 4-wk avg</div>
            </div>
            <div>
              <div className="k">Open Tasks</div>
              <div className="v">12</div>
              <div className="sm">2 overdue · 2 P1</div>
            </div>
            <div>
              <div className="k">Queue</div>
              <div className="v">4 <span style={{fontSize:16, color:'var(--ink-4)'}}>/ 1 exam</span></div>
              <div className="sm">Avg wait 8m</div>
            </div>
          </div>
        </section>

        <section className="news-strip">
          <div>
            <div className="eyebrow">Shift brief · 10:14 AM</div>
            <h4>Lens lab delivery expected 4 PM — 6 job cards affected</h4>
            <p>Job cards JB-0411 through JB-0417 are queued with LensKart Lab, Okhla. Confirm pickup slot by 2 PM.</p>
            <div className="ago">Posted 38m ago by Ops Head</div>
          </div>
          <div>
            <div className="eyebrow">Jarvis · Stock Sentinel</div>
            <h4>Auto-drafted 1 reorder</h4>
            <p>Acuvue Oasys 1-Day 30pk · qty 24 · awaiting your approval in Inventory.</p>
            <div className="ago">14m ago</div>
          </div>
          <div>
            <div className="eyebrow">SOP of the day</div>
            <h4>SOP-FIN-02 · Cash drawer close</h4>
            <p>Count drawer, reconcile tender, log variance &gt; ₹50. Owner: closing cashier.</p>
            <div className="ago">Due 9:00 PM</div>
          </div>
        </section>

        <section className="modules">
          <div className="section-head">
            <span className="eyebrow">Workspaces</span>
            <span className="line"></span>
            <span className="sub">8 modules · role-gated</span>
          </div>

          {modules.map(m => (
            <a key={m.id} className={'mod-card' + (m.feature ? ' feature' : '')} href={m.href}>
              {m.badge && <span className="mod-badge">{m.badge}</span>}
              <div className="mod-head">
                <div className="mod-icon">{m.icon}</div>
              </div>
              <div className="eyebrow">{m.eyebrow}</div>
              <h3 className="mod-title">{m.title}</h3>
              <p className="mod-desc">{m.desc}</p>
              <div className="mod-meta">
                {m.meta.map(([k,v]) => (
                  <div key={k}>
                    <span>{k}</span>
                    <strong>{v}</strong>
                  </div>
                ))}
              </div>
            </a>
          ))}
        </section>
      </div>
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Hub />);
</script>
</body>
</html>
