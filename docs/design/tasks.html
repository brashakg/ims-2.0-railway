<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>IMS 2.0 · Tasks & SOPs</title>
<meta name="viewport" content="width=1440" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shell/tokens.css" />
<link rel="stylesheet" href="shell/shell.css" />
<style>
.t-body { display: grid; grid-template-columns: 1fr 400px; height: calc(100vh - 52px); min-height: 0; }
.t-list { padding: 24px 28px; overflow-y: auto; }
.t-detail { background: var(--surface); border-left: 1px solid var(--line); overflow-y: auto; }

.t-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 18px; }
.t-head h2 { margin: 0 0 4px; font-family: var(--font-display); font-size: 32px; letter-spacing: -0.01em; }

/* Priority legend */
.pri-strip {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  margin-bottom: 18px;
}
.pri-strip > div { padding: 12px 14px; border-right: 1px solid var(--line); position: relative; }
.pri-strip > div:last-child { border-right: 0; }
.pri-strip .bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.pri-strip .l { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
.pri-strip .v { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 24px; line-height: 1; letter-spacing: -.02em; }
.pri-strip .d { font-size: 11.5px; color: var(--ink-4); margin-top: 3px; }

/* Task card */
.t-item {
  padding: 14px 16px; background: var(--surface);
  border: 1px solid var(--line); border-radius: 10px; margin-bottom: 8px;
  cursor: pointer; transition: border-color .12s, background .12s;
  display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center;
}
.t-item:hover { border-color: var(--line-strong); }
.t-item.sel { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(20,20,19,.06); }
.t-item.overdue { border-color: var(--err); background: var(--err-50); }
.t-item.overdue:hover { background: var(--err-50); }

.t-item .pri-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; min-width: 48px; }

.count-pill {
  font: 600 11px/1 var(--font-mono);
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 7px; border-radius: 4px;
  background: var(--bg-sunk); color: var(--ink-3);
}
.count-pill.hot { background: var(--err-50); color: var(--err); }
.count-pill.warm { background: var(--warn-50); color: var(--warn); }
.count-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.t-item .ttl { font: 500 13.5px/1.3 var(--font-sans); color: var(--ink); margin-bottom: 6px; }
.t-item .meta { display: flex; gap: 12px; font-size: 11.5px; color: var(--ink-4); align-items: center; }
.t-item .meta .mono { color: var(--ink-3); }
.t-item .esc {
  margin-top: 8px; padding: 6px 10px; background: var(--err-50); color: var(--err);
  border-radius: 6px; font: 500 11px/1.3 var(--font-sans);
  display: flex; gap: 6px; align-items: center;
}

.t-item .own {
  width: 30px; height: 30px; border-radius: 50%; background: var(--bg-sunk);
  display: grid; place-items: center; font: 600 11px/1 var(--font-mono); color: var(--ink-2);
}

/* Detail */
.d-head {
  padding: 20px 22px; border-bottom: 1px solid var(--line);
}
.d-head h3 { margin: 0 0 6px; font-family: var(--font-display); font-size: 22px; letter-spacing: -.01em; line-height: 1.15; }
.d-body { padding: 18px 22px; }
.d-sec { margin-bottom: 20px; }
.d-sec h4 { margin: 0 0 10px; font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .1em; }

.timer-big {
  display: flex; align-items: baseline; gap: 10px;
  padding: 16px 18px; background: var(--err-50); border-radius: 10px;
  margin-bottom: 18px;
}
.timer-big .v { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 38px; line-height: 1; color: var(--err); letter-spacing: -.03em; }
.timer-big .l { font-size: 11.5px; color: var(--err); font-weight: 500; }

.ladder {
  background: var(--bg-sunk); border-radius: 10px; padding: 14px 16px;
}
.ladder-step { display: flex; gap: 12px; align-items: center; padding: 7px 0; font-size: 12.5px; }
.ladder-step .rung { width: 22px; height: 22px; border-radius: 50%; background: var(--surface); border: 1.5px solid var(--line-strong); display: grid; place-items: center; font: 600 10px/1 var(--font-mono); color: var(--ink-4); flex-shrink:0; }
.ladder-step.done .rung { background: var(--ok); border-color: var(--ok); color: #fff; }
.ladder-step.cur .rung { background: var(--err); border-color: var(--err); color: #fff; }
.ladder-step .when { font-family: var(--font-mono); color: var(--ink-4); font-size: 11px; margin-left: auto; }
.ladder-step .who { color: var(--ink-2); }
.ladder-step.cur .who { font-weight: 600; color: var(--err); }

.sop-box {
  border: 1px solid var(--line); border-radius: 8px; padding: 12px 14px;
  font-size: 12.5px; line-height: 1.5; color: var(--ink-2);
}
.sop-box .sid { font-family: var(--font-mono); font-size: 11px; color: var(--bv); margin-bottom: 6px; font-weight: 600; }
.sop-box ol { margin: 8px 0 0; padding-left: 18px; color: var(--ink-3); }
.sop-box ol li { margin-bottom: 4px; }

/* ── New-task modal ─────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(22,22,20,.42);
  backdrop-filter: blur(2px);
  display: grid; place-items: center; z-index: 200;
  animation: fade .18s ease-out;
}
@keyframes fade { from{opacity:0} to{opacity:1} }
.modal {
  width: 1060px; max-width: calc(100vw - 40px); max-height: calc(100vh - 40px);
  background: var(--surface); border-radius: 14px;
  box-shadow: 0 40px 80px -20px rgba(0,0,0,.4), 0 0 0 1px var(--line-strong);
  display: grid; grid-template-rows: auto 1fr auto;
  overflow: hidden;
  animation: pop .22s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes pop { from{transform:scale(.96); opacity:0} to{transform:scale(1); opacity:1} }

.modal-head {
  display: grid; grid-template-columns: 1fr auto; gap: 20px; align-items: center;
  padding: 18px 24px; border-bottom: 1px solid var(--line);
}
.modal-head h2 { margin: 0; font-family: var(--font-display); font-size: 24px; letter-spacing: -.01em; }
.modal-head .sub { font-size: 12px; color: var(--ink-4); margin-top: 3px; }
.modal-head .close { background: transparent; border: 0; width: 32px; height: 32px; border-radius: 6px; display: grid; place-items: center; cursor: pointer; color: var(--ink-4); }
.modal-head .close:hover { background: var(--bg-sunk); color: var(--ink); }

.modal-body {
  display: grid; grid-template-columns: 1fr 340px; gap: 0;
  overflow: hidden;
}
.modal-form { padding: 22px 26px; overflow-y: auto; }
.modal-preview { background: var(--bg-sunk); border-left: 1px solid var(--line); padding: 22px 22px; overflow-y: auto; }

.field { margin-bottom: 18px; }
.field label { display: block; font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 8px; }
.field label .req { color: var(--err); margin-left: 3px; }
.field .hint-line { font-size: 11px; color: var(--ink-4); margin-top: 5px; font-style: italic; }
.field textarea { min-height: 68px; resize: vertical; }

/* Priority chips */
.pri-pick {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
}
.pri-chip {
  padding: 10px 12px; border: 1.5px solid var(--line); border-radius: 8px;
  cursor: pointer; background: var(--surface); text-align: left;
  position: relative; transition: border-color .1s, background .1s;
}
.pri-chip:hover { border-color: var(--line-strong); }
.pri-chip.on { border-color: var(--ink); background: var(--bg-sunk); box-shadow: 0 0 0 2px rgba(20,20,19,.04); }
.pri-chip .bar { height: 3px; border-radius: 2px; margin-bottom: 8px; }
.pri-chip .t { font: 600 12px/1 var(--font-sans); }
.pri-chip .s { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-top: 4px; }

/* Due presets */
.preset-row { display: flex; gap: 6px; flex-wrap: wrap; }
.preset {
  padding: 6px 11px; border: 1px solid var(--line); border-radius: 20px;
  background: var(--surface); font: 500 11.5px/1 var(--font-sans); color: var(--ink-3);
  cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
}
.preset:hover { border-color: var(--line-strong); color: var(--ink); }
.preset.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.preset .mono { font-family: var(--font-mono); font-size: 10.5px; opacity: .7; }
.preset.on .mono { opacity: .85; }

/* Two-col row */
.row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* Owner picker */
.owner-pick { display: flex; gap: 6px; flex-wrap: wrap; }
.owner-opt {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px 6px 6px; border: 1px solid var(--line); border-radius: 20px;
  background: var(--surface); cursor: pointer; font: 500 11.5px/1 var(--font-sans);
}
.owner-opt .av { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-sunk); display: grid; place-items: center; font: 600 9.5px/1 var(--font-mono); color: var(--ink-2); }
.owner-opt.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.owner-opt.on .av { background: #3a3a37; color: #fff; }
.owner-opt:hover:not(.on) { border-color: var(--line-strong); }

/* Attach chips */
.attach-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.attach-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px 5px 8px; background: var(--bv-50, #fef3ec); color: var(--bv);
  border-radius: 6px; font: 500 11px/1 var(--font-sans);
  border: 1px solid rgba(194,65,12,.15);
}
.attach-chip .x { background: transparent; border: 0; cursor: pointer; color: inherit; padding: 0; margin-left: 2px; opacity: .6; }
.attach-chip .x:hover { opacity: 1; }

/* Escalation section */
.esc-toggle {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px; background: var(--bg-sunk); border-radius: 10px;
  margin-bottom: 10px; cursor: pointer;
}
.esc-toggle .sw {
  width: 36px; height: 22px; border-radius: 11px; background: var(--line-strong);
  position: relative; transition: background .15s; flex-shrink: 0;
}
.esc-toggle .sw::after {
  content: ''; position: absolute; top: 2px; left: 2px; width: 18px; height: 18px;
  border-radius: 50%; background: #fff; transition: transform .15s;
  box-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.esc-toggle.on .sw { background: var(--ok); }
.esc-toggle.on .sw::after { transform: translateX(14px); }
.esc-toggle .t { font: 500 13px/1.2 var(--font-sans); }
.esc-toggle .s { font-size: 11.5px; color: var(--ink-4); margin-top: 2px; }

/* Preview card (in modal sidebar) */
.prv-eyebrow { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 10px; }
.prv-task {
  padding: 14px; background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; display: grid; grid-template-columns: auto 1fr; gap: 12px;
}
.prv-task.overdue { border-color: var(--err); background: var(--err-50); }
.prv-task .pill { align-self: start; }
.prv-ladder {
  background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
  padding: 12px 14px; margin-top: 14px;
}
.prv-ladder .step { display: flex; gap: 10px; align-items: center; padding: 5px 0; font-size: 11.5px; }
.prv-ladder .step .dot-r { width: 8px; height: 8px; border-radius: 50%; background: var(--line-strong); flex-shrink: 0; }
.prv-ladder .step.cur .dot-r { background: var(--err); }
.prv-ladder .step .when { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4); margin-left: auto; }
.prv-ladder .step.cur { font-weight: 600; color: var(--err); }

.modal-foot {
  padding: 14px 24px; border-top: 1px solid var(--line); background: var(--bg-sunk);
  display: flex; gap: 10px; align-items: center;
}
.modal-foot .kbd {
  font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-4);
  padding: 3px 6px; background: var(--surface); border: 1px solid var(--line); border-radius: 4px;
  margin-right: 4px;
}
.modal-foot .spacer { flex: 1; }

.flash-new {
  animation: flashNew 1.4s ease-out;
}
@keyframes flashNew {
  0% { background: var(--bv-50, #fef3ec); border-color: var(--bv); box-shadow: 0 0 0 3px rgba(194,65,12,.15); }
  60% { background: var(--bv-50, #fef3ec); border-color: var(--bv); }
  100% { background: var(--surface); }
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="shell/data.js"></script>
<script type="text/babel" src="shell/shell.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const PRI_COLORS = {
  P0: 'var(--p0)', P1: 'var(--p1)', P2: 'var(--p2)', P3: 'var(--p3)', P4: 'var(--p4)'
};

function Countdown({ minutes }) {
  const [m, setM] = useState(minutes);
  useEffect(() => {
    if (m <= 0) return;
    const t = setInterval(() => setM(x => Math.max(0, x - 1)), 60000);
    return () => clearInterval(t);
  }, [m]);
  const hot = m < 10, warm = m < 30;
  return (
    <span className={'count-pill ' + (hot?'hot':warm?'warm':'')}>
      {(hot || warm) && <span className="dot" />}
      {m}m
    </span>
  );
}

/* ─────────────────── New-task modal ─────────────────── */
const PRI_META = [
  { id:'P0', bar:'var(--p0)', t:'P0 · Now',       s:'Safety / compliance', defaultMin: 10 },
  { id:'P1', bar:'var(--p1)', t:'P1 · < 30m',     s:'Active escalation',   defaultMin: 30 },
  { id:'P2', bar:'var(--p2)', t:'P2 · Today',     s:'Before shift close',  defaultMin: 120 },
  { id:'P3', bar:'var(--p3)', t:'P3 · Week',      s:'Plannable',           defaultMin: 60*24 },
  { id:'P4', bar:'var(--p4)', t:'P4 · Backlog',   s:'Nice-to-have',        defaultMin: 60*24*3 },
];

const SOP_LIBRARY = [
  { id:'SOP-FIN-01', n:'Tax invoice — every sale' },
  { id:'SOP-FIN-02', n:'Cash drawer close' },
  { id:'SOP-CLN-01', n:'Token issued on walk-in' },
  { id:'SOP-CLN-02', n:'Rx card handed to customer' },
  { id:'SOP-LAB-03', n:'Job card with lens dispatch' },
  { id:'SOP-INV-07', n:'Inter-store transfer / reorder' },
  { id:'SOP-INV-12', n:'Non-moving SKU review' },
  { id:'SOP-OPS-02', n:'Weekly deep-clean' },
  { id:'SOP-OPS-11', n:'Lab confirmation pending' },
  { id:'SOP-CX-04',  n:'NPS follow-up & exchange' },
  { id:'— none —',   n:'Ad-hoc (no SOP)' },
];

const TEAM = [
  { id:'SK', n:'Sonia K.',  r:'Store Manager' },
  { id:'RP', n:'Rohan P.',  r:'ASM' },
  { id:'AS', n:'Aarav S.',  r:'Optician' },
  { id:'MK', n:'Meera K.',  r:'Associate' },
  { id:'PB', n:'Priya B.',  r:'Ops Head' },
  { id:'—',  n:'Auto-assign', r:'By role' },
];

const DUE_PRESETS = [
  { k:'15m', m:15 }, { k:'30m', m:30 }, { k:'1h', m:60 },
  { k:'2h', m:120 }, { k:'End of shift', m:360 }, { k:'Tomorrow 10am', m:60*20 },
  { k:'This week', m:60*24*3 },
];

function NewTaskModal({ onClose, onCreate }) {
  const [title, setTitle] = useState('');
  const [desc, setDesc] = useState('');
  const [pri, setPri] = useState('P2');
  const [sop, setSop] = useState('SOP-FIN-02');
  const [owner, setOwner] = useState('SK');
  const [watchers, setWatchers] = useState(['RP']);
  const [due, setDue] = useState(120);
  const [escalate, setEscalate] = useState(true);
  const [attachments, setAttachments] = useState([
    { k:'customer', v:'CUS-00214 · Aanya Sharma' },
  ]);

  // keyboard
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'Escape') onClose();
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') submit();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  });

  const fmtDue = (m) => m < 60 ? `${m}m` : m < 60*24 ? `${Math.round(m/60)}h` : `${Math.round(m/(60*24))}d`;

  const submit = () => {
    if (!title.trim()) return;
    const nextId = 'TSK-' + (2211 + Math.floor(Math.random()*100) + 1);
    onCreate({
      id: nextId, title: title.trim(), pri, due: fmtDue(due), owner, sop,
      stage: 'Open',
      esc: escalate && (pri === 'P0' || pri === 'P1') ? `Escalates to ASM in ${fmtDue(due)}` : undefined,
    });
  };

  const priMeta = PRI_META.find(p => p.id === pri);
  const willOverdue = (pri === 'P1' || pri === 'P0') && due < 10;

  return (
    <div className="modal-overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <h2>New task</h2>
            <div className="sub">Tied to an SOP, assigned to an owner, auto-escalated when overdue.</div>
          </div>
          <button className="close" onClick={onClose} aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round">
              <path d="M4 4l8 8M12 4l-8 8"/>
            </svg>
          </button>
        </div>

        <div className="modal-body">
          <div className="modal-form">
            <div className="field">
              <label>Title <span className="req">*</span></label>
              <input className="input" value={title} onChange={e => setTitle(e.target.value)}
                     placeholder="e.g. Reconcile Vision-Express invoice VE-8821" autoFocus />
            </div>

            <div className="field">
              <label>Description</label>
              <textarea className="input" value={desc} onChange={e => setDesc(e.target.value)}
                        placeholder="What needs to happen, in one or two lines. Markdown OK." />
            </div>

            <div className="field">
              <label>Priority <span className="req">*</span></label>
              <div className="pri-pick">
                {PRI_META.map(p => (
                  <button key={p.id}
                          className={'pri-chip' + (pri === p.id ? ' on' : '')}
                          onClick={() => { setPri(p.id); setDue(p.defaultMin); }}>
                    <div className="bar" style={{background: p.bar}}/>
                    <div className="t">{p.t}</div>
                    <div className="s">{p.s}</div>
                  </button>
                ))}
              </div>
              <div className="hint-line">
                {pri === 'P0' && 'Drops everything. Blocks shift close until resolved. Default owner: Store Manager.'}
                {pri === 'P1' && 'Counts down live in the list. Escalates up the ladder when the timer hits zero.'}
                {pri === 'P2' && 'Must close before end-of-shift. Rolls forward to next day otherwise.'}
                {pri === 'P3' && 'Planned work for this week. Shown in "week" view.'}
                {pri === 'P4' && 'Backlog. Visible in reports but not the daily board.'}
              </div>
            </div>

            <div className="row-2">
              <div className="field">
                <label>Due in <span className="req">*</span></label>
                <div className="preset-row">
                  {DUE_PRESETS.map(p => (
                    <button key={p.k} className={'preset' + (due === p.m ? ' on' : '')} onClick={() => setDue(p.m)}>
                      {p.k} <span className="mono">· {fmtDue(p.m)}</span>
                    </button>
                  ))}
                </div>
                {willOverdue && <div className="hint-line" style={{color:'var(--err)', fontStyle:'normal'}}>⚠ This will show as overdue immediately.</div>}
              </div>

              <div className="field">
                <label>Attach SOP</label>
                <select className="input" value={sop} onChange={e => setSop(e.target.value)} style={{height:36}}>
                  {SOP_LIBRARY.map(s => (
                    <option key={s.id} value={s.id}>{s.id} — {s.n}</option>
                  ))}
                </select>
                <div className="hint-line">SOP defines trigger, steps, and the escalation ladder.</div>
              </div>
            </div>

            <div className="field">
              <label>Owner <span className="req">*</span></label>
              <div className="owner-pick">
                {TEAM.map(t => (
                  <button key={t.id}
                          className={'owner-opt' + (owner === t.id ? ' on' : '')}
                          onClick={() => setOwner(t.id)}>
                    <span className="av">{t.id}</span>
                    <span>{t.n}<span style={{opacity:.55, fontWeight:400}}> · {t.r}</span></span>
                  </button>
                ))}
              </div>
            </div>

            <div className="field">
              <label>Watchers</label>
              <div className="owner-pick">
                {TEAM.filter(t => t.id !== owner && t.id !== '—').map(t => (
                  <button key={t.id}
                          className={'owner-opt' + (watchers.includes(t.id) ? ' on' : '')}
                          onClick={() => setWatchers(ws => ws.includes(t.id) ? ws.filter(x => x !== t.id) : [...ws, t.id])}>
                    <span className="av">{t.id}</span>
                    <span>{t.n}</span>
                  </button>
                ))}
              </div>
              <div className="hint-line">Get notified on status change. Not responsible for completion.</div>
            </div>

            <div className="field">
              <label>Auto-escalation</label>
              <div className={'esc-toggle' + (escalate ? ' on' : '')} onClick={() => setEscalate(e => !e)}>
                <div className="sw"/>
                <div>
                  <div className="t">{escalate ? 'Enabled — will auto-escalate when overdue' : 'Disabled — stays with owner'}</div>
                  <div className="s">Uses the ladder defined in {sop}. Preview on the right.</div>
                </div>
              </div>
            </div>

            <div className="field">
              <label>Attach context</label>
              <div className="attach-row">
                {attachments.map((a, i) => (
                  <span key={i} className="attach-chip">
                    <span style={{fontFamily:'var(--font-mono)', fontSize:10, textTransform:'uppercase', letterSpacing:'.08em', opacity:.6}}>{a.k}</span>
                    {a.v}
                    <button className="x" onClick={() => setAttachments(xs => xs.filter((_,j) => j !== i))}>✕</button>
                  </span>
                ))}
                <button className="btn sm" onClick={() => setAttachments([...attachments, { k:'order', v:'BV-GK1-249183' }])}>
                  + Invoice
                </button>
                <button className="btn sm" onClick={() => setAttachments([...attachments, { k:'sku', v:'FRM-RB-2140-BLK' }])}>
                  + SKU
                </button>
                <button className="btn sm" onClick={() => setAttachments([...attachments, { k:'job', v:'JB-GK1-0418' }])}>
                  + Job card
                </button>
              </div>
            </div>
          </div>

          {/* Right sidebar — preview */}
          <aside className="modal-preview">
            <div className="prv-eyebrow">Preview · how this appears</div>
            <div className={'prv-task' + (willOverdue ? ' overdue' : '')}>
              <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:6}}>
                <span className={'pill pill-' + pri}>{pri}</span>
                <span className={'count-pill' + (due < 10 ? ' hot' : due < 30 ? ' warm' : '')}>
                  {(due < 30) && <span className="dot"/>}
                  {fmtDue(due)}
                </span>
              </div>
              <div>
                <div style={{font:'500 13px/1.3 var(--font-sans)', marginBottom:6}}>
                  {title || <span style={{color:'var(--ink-5)', fontStyle:'italic'}}>Task title will appear here…</span>}
                </div>
                <div style={{display:'flex', gap:10, fontSize:11, color:'var(--ink-4)', flexWrap:'wrap'}}>
                  <span className="mono">TSK-????</span>
                  <span>·</span>
                  <span>{sop}</span>
                  <span>·</span>
                  <span style={{display:'inline-flex', alignItems:'center', gap:4}}>
                    <span style={{width:16, height:16, borderRadius:'50%', background:'var(--bg-sunk)', display:'inline-grid', placeItems:'center', font:'600 8px/1 var(--font-mono)', color:'var(--ink-2)'}}>{owner}</span>
                    {TEAM.find(t => t.id === owner)?.n}
                  </span>
                </div>
              </div>
            </div>

            {escalate && (
              <>
                <div className="prv-eyebrow" style={{marginTop:24}}>Escalation ladder · from {sop}</div>
                <div className="prv-ladder">
                  <div className="step cur">
                    <div className="dot-r"/>
                    <div>Step 1 · {TEAM.find(t => t.id === owner)?.n || owner}</div>
                    <div className="when">Now · {fmtDue(due)}</div>
                  </div>
                  <div className="step">
                    <div className="dot-r"/>
                    <div>Step 2 · ASM · Rohan P.</div>
                    <div className="when">+{fmtDue(due)}</div>
                  </div>
                  <div className="step">
                    <div className="dot-r"/>
                    <div>Step 3 · Ops Head · Priya B.</div>
                    <div className="when">+{fmtDue(due * 2)}</div>
                  </div>
                  <div className="step">
                    <div className="dot-r"/>
                    <div>Step 4 · Regional</div>
                    <div className="when">+{fmtDue(due * 4)}</div>
                  </div>
                </div>
              </>
            )}

            <div className="prv-eyebrow" style={{marginTop:24}}>Notifications</div>
            <div style={{fontSize:11.5, color:'var(--ink-3)', lineHeight:1.55, background:'var(--surface)', border:'1px solid var(--line)', borderRadius:8, padding:'10px 12px'}}>
              <div style={{marginBottom:6}}>
                <span style={{fontFamily:'var(--font-mono)', fontSize:10, color:'var(--ink-4)', textTransform:'uppercase', letterSpacing:'.08em'}}>On create →</span> {TEAM.find(t => t.id === owner)?.n} (in-app + SMS)
              </div>
              {watchers.length > 0 && <div style={{marginBottom:6}}>
                <span style={{fontFamily:'var(--font-mono)', fontSize:10, color:'var(--ink-4)', textTransform:'uppercase', letterSpacing:'.08em'}}>Watchers →</span> {watchers.map(w => TEAM.find(t => t.id === w)?.n.split(' ')[0]).join(', ')} (in-app)
              </div>}
              {escalate && <div>
                <span style={{fontFamily:'var(--font-mono)', fontSize:10, color:'var(--ink-4)', textTransform:'uppercase', letterSpacing:'.08em'}}>On overdue →</span> Ladder kicks in automatically
              </div>}
            </div>
          </aside>
        </div>

        <div className="modal-foot">
          <span><span className="kbd">Esc</span> to cancel</span>
          <span><span className="kbd">⌘</span><span className="kbd">↵</span> to create</span>
          <div className="spacer"/>
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={submit} disabled={!title.trim()}>
            Create task {priMeta && <span style={{opacity:.7, marginLeft:6, fontFamily:'var(--font-mono)', fontSize:11}}>· {pri} · {fmtDue(due)}</span>}
          </button>
        </div>
      </div>
    </div>
  );
}

function Tasks() {
  const [sel, setSel] = useState(MOCK.tasks[0]);
  const [tasks, setTasks] = useState(MOCK.tasks);
  const [modal, setModal] = useState(false);
  const [flashId, setFlashId] = useState(null);

  const counts = tasks.reduce((a, t) => { a[t.pri] = (a[t.pri]||0) + 1; return a; }, {});

  const handleCreate = (task) => {
    setTasks([task, ...tasks]);
    setSel(task);
    setModal(false);
    setFlashId(task.id);
    setTimeout(() => setFlashId(null), 1600);
  };

  return (
    <Shell active="tasks" crumbs={['Tasks & SOPs']} role="Store Manager"
      actions={<>
        <button className="btn sm">Filter</button>
        <button className="btn sm primary" onClick={() => setModal(true)}>+ New task</button>
      </>}>
      <div className="t-body">
        <div className="t-list">
          <div className="t-head">
            <div>
              <div className="eyebrow" style={{marginBottom:6}}>Operations</div>
              <h2>The shift, by priority.</h2>
            </div>
            <div className="row" style={{gap:8}}>
              <button className="btn sm">Mine (4)</button>
              <button className="btn sm">Team</button>
              <button className="btn sm">Completed</button>
            </div>
          </div>

          <div className="pri-strip">
            <div><div className="bar" style={{background:'var(--p0)'}}></div><div className="l">P0 · Now</div><div className="v">0</div><div className="d">Immediate</div></div>
            <div><div className="bar" style={{background:'var(--p1)'}}></div><div className="l">P1 · &lt; 30m</div><div className="v">{counts.P1||0}</div><div className="d">Escalating</div></div>
            <div><div className="bar" style={{background:'var(--p2)'}}></div><div className="l">P2 · Today</div><div className="v">{counts.P2||0}</div><div className="d">Shift close</div></div>
            <div><div className="bar" style={{background:'var(--p3)'}}></div><div className="l">P3 · Week</div><div className="v">{counts.P3||0}</div><div className="d">Plannable</div></div>
            <div><div className="bar" style={{background:'var(--p4)'}}></div><div className="l">P4 · Backlog</div><div className="v">{counts.P4||0}</div><div className="d">Nice-to-have</div></div>
          </div>

          {tasks.map(t => (
            <div key={t.id}
                 className={'t-item' + (sel?.id === t.id ? ' sel' : '') + ((t.pri==='P1' && parseInt(t.due)<10)? ' overdue':'') + (flashId === t.id ? ' flash-new' : '')}
                 onClick={() => setSel(t)}>
              <div className="pri-wrap">
                <span className={'pill-'+t.pri}>{t.pri}</span>
                <Countdown minutes={parseInt(t.due) || 60} />
              </div>
              <div>
                <div className="ttl">{t.title}</div>
                <div className="meta">
                  <span className="mono">{t.id}</span>
                  <span>·</span>
                  <span>{t.sop}</span>
                  <span>·</span>
                  <span>Stage: <strong className="strong">{t.stage}</strong></span>
                </div>
                {t.esc && (
                  <div className="esc">
                    <Icon.zap width="12" height="12" /> {t.esc}
                  </div>
                )}
              </div>
              <div className="own" title={'Owner: ' + t.owner}>{t.owner}</div>
            </div>
          ))}
        </div>

        {/* Detail */}
        <aside className="t-detail">
          <div className="d-head">
            <div className="row" style={{gap:8, marginBottom:10}}>
              <span className={'pill-'+sel.pri}>{sel.pri}</span>
              <span className="mono hint">{sel.id}</span>
              <span className="spacer" style={{flex:1}}></span>
              <button className="btn sm"><Icon.user width="12" height="12" /> Reassign</button>
            </div>
            <h3>{sel.title}</h3>
            <div className="hint">Created 09:18 · by Store Manager</div>
          </div>
          <div className="d-body">
            {sel.esc && (
              <div className="timer-big">
                <div>
                  <div className="l">AUTO-ESCALATES IN</div>
                  <div className="v">{parseInt(sel.due) || 0}<span style={{fontSize:20}}>m</span></div>
                </div>
                <div style={{marginLeft:'auto', textAlign:'right', color:'var(--err)', fontSize:11.5, maxWidth:160}}>
                  Next owner: <strong>ASM · Rohan P.</strong><br/>
                  Then: <strong>Ops Head</strong> in +30m
                </div>
              </div>
            )}

            <div className="d-sec">
              <h4>Escalation ladder</h4>
              <div className="ladder">
                <div className="ladder-step done">
                  <div className="rung">1</div>
                  <div className="who">Cashier / On-duty</div>
                  <div className="when">09:18 assigned</div>
                </div>
                <div className="ladder-step cur">
                  <div className="rung">2</div>
                  <div className="who">Store Manager (you)</div>
                  <div className="when">Now · {parseInt(sel.due)}m left</div>
                </div>
                <div className="ladder-step">
                  <div className="rung">3</div>
                  <div className="who">ASM · Rohan P.</div>
                  <div className="when">+{parseInt(sel.due)}m</div>
                </div>
                <div className="ladder-step">
                  <div className="rung">4</div>
                  <div className="who">Ops Head · Priya B.</div>
                  <div className="when">+{parseInt(sel.due)+30}m</div>
                </div>
              </div>
            </div>

            <div className="d-sec">
              <h4>Attached SOP</h4>
              <div className="sop-box">
                <div className="sid">{sel.sop} · Cash drawer close</div>
                <strong>Trigger</strong> — End of shift, before 9:00 PM.<br/>
                <strong>Owner</strong> — Closing cashier. <strong>Approver</strong> — Store Manager.
                <ol>
                  <li>Count physical cash; record in denominations panel.</li>
                  <li>Compare against system drawer open + tender log.</li>
                  <li>If variance ≤ ₹50, sign off and close drawer.</li>
                  <li>If variance &gt; ₹50, open TSK-escalation and video review.</li>
                  <li>Deposit cash to safe; capture seal photo.</li>
                </ol>
                <div style={{marginTop:10}}>
                  <button className="btn sm">Open full SOP</button>
                </div>
              </div>
            </div>

            <div className="d-sec">
              <h4>Activity</h4>
              <div style={{fontSize:12.5, lineHeight:1.6, color:'var(--ink-2)'}}>
                <div style={{padding:'6px 0', borderBottom:'1px solid var(--line-soft)'}}>
                  <span className="mono hint">09:18</span> · <strong>Jarvis · Escalation Engine</strong> created task from SOP trigger.
                </div>
                <div style={{padding:'6px 0', borderBottom:'1px solid var(--line-soft)'}}>
                  <span className="mono hint">09:22</span> · Assigned to <strong>Sonia K.</strong> (auto by role).
                </div>
                <div style={{padding:'6px 0'}}>
                  <span className="mono hint">09:30</span> · Status → <strong>Open</strong>.
                </div>
              </div>
            </div>

            <div className="row" style={{gap:8, marginTop:20}}>
              <button className="btn lg primary block">Mark complete</button>
              <button className="btn lg">Snooze 10m</button>
            </div>
          </div>
        </aside>
      </div>
      {modal && <NewTaskModal onClose={() => setModal(false)} onCreate={handleCreate} />}
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Tasks />);
</script>
</body>
</html>
