<style>
.acc-body { padding: 24px 28px; overflow-y: auto; height: calc(100vh - 52px); background: var(--bg); }
.acc-head { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
.acc-head h2 { margin: 0 0 4px; font-family: var(--font-display); font-size: 32px; letter-spacing: -0.01em; }

.acc-tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin-bottom: 18px; }
.acc-tabs button {
  height: 36px; padding: 0 14px; border: 0; background: transparent;
  font: 500 12.5px/1 var(--font-sans); color: var(--ink-4); cursor: pointer;
  position: relative; border-bottom: 2px solid transparent; margin-bottom: -1px;
}
.acc-tabs button.on { color: var(--ink); border-bottom-color: var(--ink); }
.acc-tabs button:hover:not(.on) { color: var(--ink-2); }
.acc-tabs .count { font-family: var(--font-mono); font-size: 10px; color: var(--ink-4); margin-left: 4px; }

/* Stat strip — same family as inventory */
.acc-stats {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 0;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  margin-bottom: 18px;
}
.acc-stats > div { padding: 14px 18px; border-right: 1px solid var(--line); }
.acc-stats > div:last-child { border-right: 0; }
.acc-stats .l { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
.acc-stats .v { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 26px; line-height: 1; letter-spacing: -.02em; }
.acc-stats .d { font-size: 11.5px; color: var(--ink-4); margin-top: 4px; }
.acc-stats .d.good { color: var(--ok); }
.acc-stats .d.bad { color: var(--err); }
.acc-stats .d.warn { color: var(--warn); }

.acc-filter { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }

/* Detail layout — list + side panel */
.acc-layout { display: grid; grid-template-columns: 1fr 380px; gap: 16px; align-items: start; }

/* Approval inbox — Email-style list */
.appr-list { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; }
.appr-row {
  display: grid; grid-template-columns: 50px 1fr auto auto; gap: 14px; padding: 14px 18px;
  border-bottom: 1px solid var(--line-soft); cursor: pointer; align-items: center;
  transition: background .1s;
}
.appr-row:hover { background: var(--bg-sunk); }
.appr-row.on { background: var(--bg-sunk); border-left: 3px solid var(--ink); padding-left: 15px; }
.appr-row:last-child { border-bottom: 0; }
.appr-row .pri {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--bg-sunk); border: 1px solid var(--line-strong);
  display: grid; place-items: center; font: 700 11px/1 var(--font-mono);
  color: var(--ink-3); flex-shrink: 0;
}
.appr-row.urg .pri { background: var(--warn-50); border-color: var(--warn); color: var(--warn); }
.appr-row .ref { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px; }
.appr-row .ttl { font: 500 13px/1.3 var(--font-sans); color: var(--ink); margin-bottom: 2px; }
.appr-row .sub { font-size: 11.5px; color: var(--ink-3); }
.appr-row .amt { font-family: var(--font-figure); font-weight: 700; font-variant-numeric: tabular-nums; font-size: 17px; letter-spacing: -.01em; }
.appr-row .age { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); }

.appr-panel { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: 0; position: sticky; top: 16px; overflow: hidden; }
.appr-panel-head { padding: 14px 18px 12px; border-bottom: 1px solid var(--line); background: var(--surface-2); }
.appr-panel-head .ref { font: 500 10px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; }
.appr-panel-head h3 { margin: 6px 0 0; font: 600 15px/1.2 var(--font-sans); }
.appr-panel-head .amt {
  font-family: var(--font-figure); font-weight: 700; font-variant-numeric: tabular-nums;
  font-size: 30px; letter-spacing: -.02em; margin-top: 8px; line-height: 1;
}
.appr-panel-section { padding: 12px 18px; border-bottom: 1px solid var(--line); }
.appr-panel-section .lbl { font: 500 10px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.appr-meta { display: grid; grid-template-columns: auto 1fr; gap: 4px 14px; font-size: 12px; }
.appr-meta .k { color: var(--ink-4); }
.appr-meta .v { color: var(--ink); font-family: var(--font-sans); }
.appr-meta .v.mono { font-family: var(--font-mono); font-size: 11.5px; }

.appr-chain { display: grid; gap: 8px; }
.appr-chain .step { display: grid; grid-template-columns: 24px 1fr auto; gap: 10px; align-items: flex-start; }
.appr-chain .step .dot { width: 10px; height: 10px; border-radius: 50%; margin-top: 6px; }
.appr-chain .step.done .dot { background: var(--ok); }
.appr-chain .step.cur .dot { background: var(--warn); box-shadow: 0 0 0 4px rgba(180, 106, 0, .15); }
.appr-chain .step.pending .dot { background: var(--ink-5); }
.appr-chain .step .who { font: 500 12px/1.3 var(--font-sans); }
.appr-chain .step .when { font: 500 10px/1 var(--font-mono); color: var(--ink-4); }

.appr-actions { padding: 14px 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: var(--surface-2); }

/* Receipt scan placeholder */
.appr-scan {
  background: var(--bg-sunk); border: 1px dashed var(--line-strong); border-radius: var(--r-sm);
  padding: 22px 12px; text-align: center; font-size: 11px; color: var(--ink-4); font-family: var(--font-mono);
}

/* Damage log */
.dmg-table { width: 100%; }
.dmg-table tr.bad td { background: rgba(180, 35, 24, .04); }
.dmg-photo {
  width: 32px; height: 32px; background: var(--bg-sunk); border: 1px solid var(--line-strong);
  border-radius: 3px; display: grid; place-items: center; font: 500 8px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase;
}

/* Ledger view */
.led-search { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; }
.led-search .seg { display: flex; gap: 2px; padding: 2px; background: var(--bg-sunk); border: 1px solid var(--line); border-radius: 8px; }
.led-search .seg button { height: 30px; padding: 0 12px; border: 0; background: transparent; font: 500 12px/1 var(--font-sans); color: var(--ink-4); cursor: pointer; border-radius: 6px; }
.led-search .seg button.on { background: var(--surface); color: var(--ink); box-shadow: var(--sh-xs); }

.led-grid { display: grid; grid-template-columns: 300px 1fr; gap: 16px; align-items: start; }
.led-list { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; }
.led-list-item {
  padding: 12px 16px; border-bottom: 1px solid var(--line-soft); cursor: pointer;
  display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;
}
.led-list-item:hover { background: var(--bg-sunk); }
.led-list-item.on { background: var(--bg-sunk); border-left: 3px solid var(--ink); padding-left: 13px; }
.led-list-item:last-child { border-bottom: 0; }
.led-list-item .n { font: 600 13px/1.2 var(--font-sans); color: var(--ink); }
.led-list-item .c { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); margin-top: 3px; text-transform: uppercase; letter-spacing: .04em; }
.led-list-item .bal { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 13px; }
.led-list-item .bal.cr { color: var(--err); }
.led-list-item .bal.dr { color: var(--ok); }

.led-detail { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; }
.led-detail-head { padding: 18px 22px; border-bottom: 1px solid var(--line); display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: flex-start; }
.led-detail-head h3 { margin: 0; font: 600 18px/1.2 var(--font-sans); }
.led-detail-head .meta { font-size: 11px; color: var(--ink-3); margin-top: 4px; }
.led-detail-bal {
  display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--line);
}
.led-detail-bal > div { padding: 12px 16px; border-right: 1px solid var(--line); }
.led-detail-bal > div:last-child { border-right: 0; }
.led-detail-bal .l { font: 500 10px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.led-detail-bal .v { font-family: var(--font-figure); font-weight: 600; font-variant-numeric: tabular-nums; font-size: 18px; letter-spacing: -.01em; }

/* ── Cash register tab ──────────────────────────────────── */
.cash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; align-items: start; }
@media (max-width: 1024px) { .cash-grid { grid-template-columns: 1fr; } }

.cash-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); overflow: hidden; }
.cash-card-head { padding: 12px 18px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; }
.cash-card-head h3 { margin: 0; font: 600 13px/1 var(--font-sans); }
.cash-card-head .meta { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; }

.denom-row {
  display: grid; grid-template-columns: 1fr 130px 120px;
  align-items: center; padding: 10px 18px;
  border-bottom: 1px solid var(--line-soft);
}
.denom-row:last-of-type { border-bottom: 0; }
.denom-row .label { font: 600 13px/1 var(--font-sans); font-variant-numeric: tabular-nums; }
.denom-row .label .hint { font: 500 10px/1 var(--font-mono); color: var(--ink-4); margin-top: 4px; text-transform: uppercase; letter-spacing: .08em; }
.denom-row .pcs { display: flex; gap: 6px; align-items: center; justify-content: center; }
.denom-row .pcs button {
  width: 26px; height: 26px; border: 1px solid var(--line-strong); background: var(--surface);
  border-radius: 4px; cursor: pointer; font-family: var(--font-mono); font-weight: 600; color: var(--ink-3);
}
.denom-row .pcs input {
  width: 52px; height: 30px; padding: 0 6px; text-align: center;
  border: 1px solid var(--line-strong); border-radius: 6px;
  font: 600 13px/1 var(--font-mono); font-variant-numeric: tabular-nums;
}
.denom-row .pcs input:focus { outline: none; border-color: var(--ink); }
.denom-row .val {
  text-align: right; font: 600 13px/1 var(--font-sans);
  font-variant-numeric: tabular-nums;
}
.denom-total {
  display: grid; grid-template-columns: 1fr 120px;
  align-items: baseline; padding: 12px 18px;
  background: var(--bg-sunk); border-top: 1.5px solid var(--ink);
}
.denom-total .l { font: 500 10.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .12em; }
.denom-total .v { text-align: right; font-family: var(--font-figure); font-weight: 700; font-variant-numeric: tabular-nums; font-size: 22px; letter-spacing: -.02em; }

.recon-row {
  display: grid; grid-template-columns: 1fr 140px;
  padding: 8px 18px; font-size: 12.5px;
  border-bottom: 1px solid var(--line-soft);
}
.recon-row:last-child { border-bottom: 0; }
.recon-row .k { color: var(--ink-3); }
.recon-row .v { text-align: right; font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--ink); }
.recon-row.expected { background: var(--bg-sunk); font-weight: 600; border-top: 2px solid var(--ink); }
.recon-row.expected .k, .recon-row.expected .v { color: var(--ink); font-weight: 700; }
.recon-row.var { background: var(--warn-50); }
.recon-row.var .k { color: var(--warn); font-weight: 700; }
.recon-row.var .v { color: var(--warn); font-weight: 700; font-size: 14px; }

.cash-actions { padding: 14px 18px; display: grid; gap: 8px; background: var(--surface-2); border-top: 1px solid var(--line); }

.cash-meta-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 22px; padding: 12px 18px; font-size: 12px; border-bottom: 1px solid var(--line-soft); }
.cash-meta-grid .k { font: 500 9.5px/1 var(--font-mono); color: var(--ink-4); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.cash-meta-grid .v { font: 500 13px/1.3 var(--font-sans); color: var(--ink); }

/* Small polish · accounts shared */
.acc-stats > div { transition: background .12s; }
.acc-stats > div:hover { background: var(--surface-2); }
.acc-stats .v { letter-spacing: -.02em; }
.appr-row { transition: background .1s, padding .12s; }
.led-list-item { transition: background .1s; }
.appr-panel-head .amt { letter-spacing: -.03em; }
.recon-row { transition: background .1s; }
.recon-row:hover:not(.expected):not(.var) { background: var(--bg-sunk); }
.denom-row { transition: background .1s; }
.denom-row:hover { background: var(--bg-sunk); }
.denom-row .pcs button:hover { background: var(--ink); color: #fff; border-color: var(--ink); }
/* ── Responsive breakpoints (iPad H / iPad V / mobile) ───────── */
@media (max-width: 1280px) {
  .acc-stats { grid-template-columns: repeat(3, 1fr); }
  .acc-stats > div:nth-child(4), .acc-stats > div:nth-child(5) { border-top: 1px solid var(--line); }
  .acc-layout { grid-template-columns: 1fr 320px; }
  .acc-tabs { overflow-x: auto; white-space: nowrap; flex-wrap: nowrap; }
  .led-grid { grid-template-columns: 260px 1fr; }
}
@media (max-width: 1024px) {
  .acc-body { padding: 20px 18px; }
  .acc-stats { grid-template-columns: repeat(2, 1fr); }
  .acc-layout { grid-template-columns: 1fr; }
  .appr-panel { position: static; }
  .led-grid { grid-template-columns: 1fr; }
  .led-detail-bal { grid-template-columns: repeat(2, 1fr); }
  .led-detail-bal > div:nth-child(3), .led-detail-bal > div:nth-child(4) { border-top: 1px solid var(--line); }
}
@media (max-width: 640px) {
  .acc-body { padding: 16px 12px; }
  .acc-stats { grid-template-columns: 1fr; }
  .acc-stats > div { border-right: 0; border-bottom: 1px solid var(--line); }
  .appr-row { grid-template-columns: 40px 1fr; gap: 10px 12px; }
  .appr-row > div:nth-child(3) { grid-column: 1 / -1; text-align: left; }
  .appr-row > div:nth-child(4) { grid-column: 2; }
  .led-detail-bal { grid-template-columns: 1fr; }
  .led-detail-bal > div { border-right: 0; border-bottom: 1px solid var(--line); border-top: 0; }
  .led-detail-head { grid-template-columns: 1fr; gap: 10px; }
}
</style>

              </div>
              <span className="spacer" style={{flex:1}}></span>
              <select className="input" style={{maxWidth:160}}>
                <option>This month</option><option>Last 30 days</option><option>This FY</option><option>Custom range</option>
              </select>
              <button className="btn sm"><Icon.printer width="14" height="14" /> Print statement</button>
              <button className="btn sm"><Icon.file width="14" height="14" /> Send by email</button>
            </div>

            <div className="led-grid">
              <div className="led-list">
                {filteredList.map(p => (
                  <div key={p.id} className={'led-list-item' + (ledSel === p.id ? ' on' : '')} onClick={()=>setLedSel(p.id)}>
                    <div>
                      <div className="n">{p.n}</div>
                      <div className="c">{p.code}</div>
                    </div>
                    <div className={'bal ' + (p.bal < 0 ? 'cr' : p.bal > 0 ? 'cr' : '')}>
                      {p.bal === 0 ? fmt(0) : (p.bal < 0 ? fmt(Math.abs(p.bal)) + ' Cr' : fmt(p.bal) + ' Dr')}
                    </div>
                  </div>
                ))}
              </div>

              <div className="led-detail">
                {ledParty && <>
                  <div className="led-detail-head">
                    <div>
                      <h3>{ledParty.n}</h3>
                      <div className="meta">{ledParty.code} · GSTIN <span className="mono">{ledParty.gstin || '—'}</span> · {ledParty.terms ? 'Terms ' + ledParty.terms : 'Phone ' + ledParty.phone}</div>
                    </div>
                    <div style={{display:'flex', gap:6}}>
                      {ledMode === 'vendor' && <button className="btn sm primary">Raise payment</button>}
                      {ledMode === 'customer' && <button className="btn sm primary">Open in POS</button>}
                    </div>
                  </div>

                  <div className="led-detail-bal">
                    <div>
                      <div className="l">{ledMode === 'vendor' ? 'Payable now' : 'Wallet balance'}</div>
                      <div className="v" style={{color: ledMode==='vendor' && ledParty.bal<0 ? 'var(--err)' : 'var(--ink)'}}>{fmt(Math.abs(ledParty.bal))}</div>
                    </div>
                    <div>
                      <div className="l">{ledMode === 'vendor' ? '30-day spend' : 'YTD spend'}</div>
                      <div className="v">{fmt(ledMode==='vendor' ? 83160 : 82460)}</div>
                    </div>
                    <div>
                      <div className="l">{ledMode === 'vendor' ? 'Lifetime' : 'Lifetime value'}</div>
                      <div className="v">{fmt(ledMode==='vendor' ? 1840000 : 124800)}</div>
                    </div>
                    <div>
                      <div className="l">{ledMode === 'vendor' ? 'Avg pay days' : 'NPS · last'}</div>
                      <div className="v">{ledMode==='vendor' ? '28 d' : '9 / 10'}</div>
                    </div>
                  </div>

                  <table className="tbl">
                    <thead><tr>
                      <th>Date</th><th>Reference</th><th>Type</th><th>Description</th>
                      <th className="right">Debit</th><th className="right">Credit</th><th className="right">Balance</th>
                    </tr></thead>
                    <tbody>
                      {ledTxns.map((t, i) => (
                        <tr key={i}>
                          <td className="mono" style={{fontSize:11}}>{t.d}</td>
                          <td className="mono" style={{fontSize:11}}>{t.ref}</td>
                          <td>{t.typ}</td>
                          <td>{t.desc}</td>
                          <td className="right mono tnum">{t.dr ? t.dr.toFixed(2) : '—'}</td>
                          <td className="right mono tnum">{t.cr ? t.cr.toFixed(2) : '—'}</td>
                          <td className={'right mono tnum strong ' + (t.bal < 0 ? '' : '')} style={{color: t.bal < 0 ? 'var(--err)' : 'var(--ink)'}}>
                            {t.bal === 0 ? fmt(0) : (t.bal < 0 ? fmt(Math.abs(t.bal)) + ' Cr' : fmt(t.bal) + ' Dr')}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                  {ledTxns.length === 0 && (
                    <div style={{padding:'30px 22px', textAlign:'center', color:'var(--ink-4)', fontSize:12}}>
                      No transactions in selected period.
                    </div>
                  )}
                </>}
              </div>
            </div>
          </>
        )}
      </div>
    </Shell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Accounts />);
</script>
</body>
</html>
