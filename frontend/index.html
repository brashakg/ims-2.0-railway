<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- BV favicons + PWA manifest -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#B42318" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- PRIVATE internal platform: keep IMS out of every search index + AI crawler.
         Backed by robots.txt + the X-Robots-Tag response header (Vercel + Railway). -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex, notranslate" />
    <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
    <title>IMS 2.0 — Better Vision</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <!-- Disable debug overlays and performance monitoring tools in production -->
    <script>
      // Disable INP and other debug overlays if not in development
      if (typeof window !== 'undefined') {
        // Disable Vite dev tools in production
        window.__VITE_DISABLE_DEV_TOOLS__ = true;
        // Disable any performance monitoring overlays
        window.__DISABLE_INP_OVERLAY__ = true;
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
