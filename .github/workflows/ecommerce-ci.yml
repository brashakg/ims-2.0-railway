name: E-commerce (BVI) Build

# Isolated CI for the bettervision-inventory app that now lives under
# ecommerce/. Path-filtered so it only runs when ecommerce/** changes, leaving
# the backend/frontend CI jobs untouched. Mirrors how the app actually builds
# (prisma generate + next build) against a throwaway Postgres service.

on:
  push:
    branches: [main, develop, 'claude/**']
    paths:
      - 'ecommerce/**'
      - '.github/workflows/ecommerce-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ecommerce/**'
      - '.github/workflows/ecommerce-ci.yml'

defaults:
  run:
    working-directory: ecommerce

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bettervision
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bettervision?schema=public
      NEXTAUTH_SECRET: ci-test-secret
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'ecommerce/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma db push (schema -> CI Postgres)
        run: npx prisma db push --skip-generate

      - name: Build (next build)
        run: npm run build
